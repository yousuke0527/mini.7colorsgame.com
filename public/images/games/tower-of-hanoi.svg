<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  

  <!-- Background -->
  <rect width="400" height="250" fill="url(#bg-grad)" />

  <!-- Outer Border -->
  <rect x="20" y="20" width="360" height="210" rx="12" fill="none" stroke="#ff007f" filter="url(#glow)" stroke-width="2" opacity="0.25" />

  <!-- Peg Board Base Platform -->
  <rect x="80" y="142" width="240" height="12" rx="4" fill="#0f172a" stroke="#ff007f" stroke-width="2.5" filter="url(#glow)" />

  <!-- Three Vertical Pegs -->
  <!-- Peg 1 (Left) -->
  <line x1="120" y1="65" x2="120" y2="142" stroke="#ff007f" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)" />
  
  <!-- Peg 2 (Center) -->
  <line x1="200" y1="65" x2="200" y2="142" stroke="#ff007f" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)" opacity="0.6" />
  
  <!-- Peg 3 (Right) -->
  <line x1="280" y1="65" x2="280" y2="142" stroke="#ff007f" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)" opacity="0.6" />

  <!-- Stacked Disks -->
  <!-- Peg 1 Disk 1: Bottom (Largest - Cyan) -->
  <g transform="translate(85, 124)">
    <rect width="70" height="16" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="2.5" filter="url(#glow)" />
    <rect width="62" height="8" x="4" y="4" rx="2" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.3" />
  </g>

  <!-- Peg 1 Disk 2: Middle (Medium - Yellow) -->
  <g transform="translate(95, 106)">
    <rect width="50" height="16" rx="4" fill="#0f172a" stroke="#eab308" stroke-width="2.5" filter="url(#glow)" />
  </g>

  <!-- Dynamic Lifting Action: Smallest Disk (Rose) lifted and moving to Peg 2 -->
  <!-- Transfer trajectory curve -->
  <path d="M 120,95 C 120,25 200,25 200,52" fill="none" stroke="#ff007f" stroke-width="2" stroke-linecap="round" stroke-dasharray="3,3" filter="url(#glow)" />
  <!-- Transfer arrowhead -->
  <path d="M 197,46 L 200,52 L 203,46" fill="none" stroke="#ff007f" stroke-width="2" stroke-linecap="round" filter="url(#glow)" />
  
  <!-- Lifted Disk (Top - Rose) hovering over Peg 2 -->
  <g transform="translate(182, 54)">
    <rect width="36" height="14" rx="3" fill="#0f172a" stroke="#ff007f" stroke-width="2.5" filter="url(#glow)" />
    <!-- Pulse ring indicating motion -->
    <rect width="42" height="20" x="-3" y="-3" rx="5" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="2,2" opacity="0.8" filter="url(#glow)"/>
  </g>

  <!-- Hanoi Game status cue -->

  <!-- タイトル -->
  
  <!-- カテゴリバッジ -->
  <rect x="150" y="210" width="100" height="18" rx="9" fill="#ff007f" opacity="0.2"/>
</svg>