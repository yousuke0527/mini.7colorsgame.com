<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  

  <!-- Background -->
  <rect width="400" height="250" fill="url(#bg-grad)" />

  <!-- Outer Border -->
  <rect x="20" y="20" width="360" height="210" rx="12" fill="none" stroke="#39ff14" filter="url(#glow)" stroke-width="2" opacity="0.25" />

  <!-- Background target alignment grid -->
  <line x1="200" y1="30" x2="200" y2="160" stroke="#39ff14" filter="url(#glow)" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.2" />

  <!-- Crane Cable & Hook lowering the active block -->
  <g transform="translate(200, 30)">
    <!-- Cable -->
    <line x1="0" y1="0" x2="0" y2="35" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="2,2" filter="url(#glow)"/>
    <!-- Mechanical Hook -->
    <path d="M -8,35 L 8,35 M -4,35 L -4,42 C -4,48 4,48 4,42 L 4,35" fill="none" stroke="#fbbf24" stroke-width="2.5" filter="url(#glow)"/>
  </g>

  <!-- Crane-Held Drop Block (Pink Neon Glow) -->
  <g transform="translate(160, 72)">
    <rect width="80" height="24" rx="4" fill="#0f172a" stroke="#ec4899" stroke-width="2.5" filter="url(#glow)"/>
    <text x="40" y="16" font-family="sans-serif" font-size="8" font-weight="bold" fill="#ec4899" text-anchor="middle" letter-spacing="1">ALIGNING</text>
    <!-- Hook connector attachments -->
    <rect x="18" y="-4" width="6" height="4" fill="#ec4899"/>
    <rect x="56" y="-4" width="6" height="4" fill="#ec4899"/>
  </g>

  <!-- Alignment Laser Guidelines -->
  <line x1="160" y1="96" x2="160" y2="155" stroke="#39ff14" filter="url(#glow)" stroke-width="1" stroke-dasharray="2,2" opacity="0.5" />
  <line x1="240" y1="96" x2="240" y2="155" stroke="#39ff14" filter="url(#glow)" stroke-width="1" stroke-dasharray="2,2" opacity="0.5" />

  <!-- Wobbly Stacked Tower (Green Neon Slabs) -->
  <!-- Slab 3 (Top stacked block, slightly tilted) -->
  <g transform="translate(166, 98) rotate(3, 34, 11)">
    <rect width="68" height="22" rx="4" fill="#0f172a" stroke="#39ff14" stroke-width="2" filter="url(#glow)"/>
  </g>

  <!-- Slab 2 (Middle stacked block, slightly tilted other way) -->
  <g transform="translate(158, 118) rotate(-4, 42, 11)">
    <rect width="84" height="22" rx="4" fill="#0f172a" stroke="#39ff14" stroke-width="2" filter="url(#glow)"/>
  </g>

  <!-- Slab 1 (Base block on ground, stable) -->
  <g transform="translate(150, 138)">
    <rect width="100" height="22" rx="4" fill="#0f172a" stroke="#39ff14" stroke-width="2" filter="url(#glow)"/>
  </g>

  <!-- Tower status HUD text -->

  <!-- タイトル -->
  
  <!-- カテゴリバッジ -->
  <rect x="150" y="210" width="100" height="18" rx="9" fill="#39ff14" opacity="0.2"/>
</svg>