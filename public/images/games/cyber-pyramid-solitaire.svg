<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  
  <rect width="400" height="250" fill="url(#bg-grad)" />
  <rect x="20" y="20" width="360" height="210" rx="12" fill="none" stroke="#e11d48" stroke-width="2" opacity="0.25" />
  
  <!-- Pyramid Solitaire Cards Layout -->
  <g transform="translate(200, 30)">
    <!-- Level 1 (Top) -->
    <g transform="translate(0, 0)">
      <rect x="-15" y="0" width="30" height="42" rx="4" fill="#0f172a" stroke="#e11d48" stroke-width="1.5" filter="url(#glow)"/>
      <text x="0" y="25" font-family="'Outfit', sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" filter="url(#glow)">7</text>
    </g>
    <!-- Level 2 -->
    <g transform="translate(-20, 25)">
      <rect x="-15" y="0" width="30" height="42" rx="4" fill="#0f172a" stroke="#e11d48" stroke-width="1.5" filter="url(#glow)"/>
      <text x="0" y="25" font-family="'Outfit', sans-serif" font-size="12" fill="#e11d48" text-anchor="middle" filter="url(#glow)">A</text>
    </g>
    <g transform="translate(20, 25)">
      <rect x="-15" y="0" width="30" height="42" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5" filter="url(#glow)"/>
      <text x="0" y="25" font-family="'Outfit', sans-serif" font-size="12" fill="#22d3ee" text-anchor="middle" filter="url(#glow)">6</text>
    </g>
    <!-- Level 3 (Highlighted pair: 5 + 8 = 13) -->
    <g transform="translate(-40, 50)">
      <rect x="-15" y="0" width="30" height="42" rx="4" fill="#0f172a" stroke="#fbbf24" stroke-width="2.5" filter="url(#glow)"/>
      <text x="0" y="25" font-family="'Outfit', sans-serif" font-size="12" fill="#fbbf24" text-anchor="middle" filter="url(#glow)">5</text>
    </g>
    <g transform="translate(0, 50)">
      <rect x="-15" y="0" width="30" height="42" rx="4" fill="#0f172a" stroke="#e11d48" stroke-width="1.5" filter="url(#glow)"/>
      <text x="0" y="25" font-family="'Outfit', sans-serif" font-size="12" fill="#e11d48" text-anchor="middle" filter="url(#glow)">Q</text>
    </g>
    <g transform="translate(40, 50)">
      <rect x="-15" y="0" width="30" height="42" rx="4" fill="#0f172a" stroke="#fbbf24" stroke-width="2.5" filter="url(#glow)"/>
      <text x="0" y="25" font-family="'Outfit', sans-serif" font-size="12" fill="#fbbf24" text-anchor="middle" filter="url(#glow)">8</text>
    </g>
    
    <!-- Connection Link between 5 and 8 -->
    <path d="M -25,71 L 25,71" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3,3" filter="url(#glow)"/>
    <text x="0" y="80" font-family="'Outfit', sans-serif" font-size="8" font-weight="bold" fill="#fbbf24" text-anchor="middle">SUM 13</text>
  </g>
  
  <text x="200" y="166" font-family="'Plus Jakarta Sans', sans-serif" font-size="10" font-weight="bold" fill="#94a3b8" text-anchor="middle" letter-spacing="3">NEON SOLITAIRE MATRIX</text>
  <rect x="150" y="210" width="100" height="18" rx="9" fill="#e11d48" opacity="0.2"/>
</svg>
