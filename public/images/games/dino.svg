<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  

  <!-- 背景 -->
  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- パルスするグリッド地面（遠近法） -->
  <path d="M 0,320 L 800,320 M 0,320 L 150,450 M 200,320 L 350,450 M 400,320 L 500,450 M 600,320 L 700,450 M 800,320 L 800,450" stroke="#1e293b" stroke-width="1.5" opacity="0.5" />
  <line x1="0" y1="340" x2="800" y2="340" stroke="#1e293b" stroke-width="1" opacity="0.4" />
  <line x1="0" y1="370" x2="800" y2="370" stroke="#1e293b" stroke-width="1.2" opacity="0.5" />
  <line x1="0" y1="410" x2="800" y2="410" stroke="#1e293b" stroke-width="1.5" opacity="0.6" />

  <!-- キャラクター（ジャンプ中のネオンピンクの走者） -->
  <g filter="url(#glowPink)">
    <!-- 躍動感のあるロボット/走者アイコン -->
    <!-- 頭 -->
    <circle cx="280" cy="180" r="10" fill="#ec4899" />
    <!-- 胴体 -->
    <path d="M 280,190 L 270,230 L 250,250" fill="none" stroke="#ec4899" stroke-width="8" stroke-linecap="round" />
    <!-- 腕 (走るモーション) -->
    <path d="M 275,200 L 295,210 L 310,200" fill="none" stroke="#ec4899" stroke-width="6" stroke-linecap="round" />
    <path d="M 275,200 L 255,215 L 245,230" fill="none" stroke="#ec4899" stroke-width="6" stroke-linecap="round" />
    <!-- 足 (曲げてジャンプ中のモーション) -->
    <path d="M 270,230 L 285,260 L 305,255" fill="none" stroke="#ec4899" stroke-width="7" stroke-linecap="round" />
    <path d="M 270,230 L 255,250 L 265,275" fill="none" stroke="#ec4899" stroke-width="7" stroke-linecap="round" />
    
    <!-- 勢いライン -->
    <line x1="210" y1="190" x2="235" y2="190" stroke="#ec4899" stroke-width="2" opacity="0.6" />
    <line x1="200" y1="215" x2="225" y2="215" stroke="#ec4899" stroke-width="2" opacity="0.7" />
    <line x1="215" y1="240" x2="235" y2="240" stroke="#ec4899" stroke-width="2" opacity="0.5" />
  </g>

  <!-- 障害物（ネオンイエローのグリッドバリア） -->
  <g filter="url(#glowYellow)">
    <!-- 三角形のデジタルスパイク -->
    <polygon points="520,320 540,260 560,320" fill="#eab308" />
    <polygon points="550,320 565,275 580,320" fill="#eab308" />
  </g>

  <!-- 装飾テキスト -->
</svg>
