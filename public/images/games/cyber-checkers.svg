<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  
  <rect width="800" height="450" fill="url(#bgGrad)" />
  <!-- Checker Board Segment (Isometric feel or Flat diagonal) -->
  <g stroke="#334155" stroke-width="1">
    <!-- Tiles -->
    <rect x="250" y="70" width="60" height="60" fill="#090d16" />
    <rect x="310" y="70" width="60" height="60" fill="#1e293b" />
    <rect x="370" y="70" width="60" height="60" fill="#090d16" />
    <rect x="430" y="70" width="60" height="60" fill="#1e293b" />
    <rect x="490" y="70" width="60" height="60" fill="#090d16" />

    <rect x="250" y="130" width="60" height="60" fill="#1e293b" />
    <rect x="310" y="130" width="60" height="60" fill="#090d16" />
    <rect x="370" y="130" width="60" height="60" fill="#1e293b" />
    <rect x="430" y="130" width="60" height="60" fill="#090d16" />
    <rect x="490" y="130" width="60" height="60" fill="#1e293b" />

    <rect x="250" y="190" width="60" height="60" fill="#090d16" />
    <rect x="310" y="190" width="60" height="60" fill="#1e293b" />
    <rect x="370" y="190" width="60" height="60" fill="#090d16" />
    <rect x="430" y="190" width="60" height="60" fill="#1e293b" />
    <rect x="490" y="190" width="60" height="60" fill="#090d16" />
  </g>
  <!-- Checker Pieces -->
  <!-- Red Piece -->
  <circle cx="340" cy="100" r="20" fill="#ef4444" filter="url(#neonRed)" />
  <circle cx="340" cy="100" r="12" fill="none" stroke="#ffffff" stroke-width="1.5" />
  <!-- Blue Piece -->
  <circle cx="400" cy="220" r="20" fill="#00f0ff" filter="url(#neonBlue)" />
  <circle cx="400" cy="220" r="12" fill="none" stroke="#ffffff" stroke-width="1.5" />
  <!-- King Blue Piece (with K label) -->
  <circle cx="280" cy="220" r="20" fill="#00f0ff" filter="url(#neonBlue)" />
  <circle cx="280" cy="220" r="12" fill="none" stroke="#ffffff" stroke-width="1.5" />
  <text x="280" y="224" font-family="Outfit, sans-serif" font-size="12" font-weight="900" fill="#ffffff" text-anchor="middle">K</text>
</svg>
