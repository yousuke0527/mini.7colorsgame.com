<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  

  <!-- Background -->
  <rect width="400" height="250" fill="url(#bg-grad)" />

  <!-- Outer Border -->
  <rect x="20" y="20" width="360" height="210" rx="12" fill="none" stroke="#eab308" stroke-width="2" opacity="0.25" />

  <!-- Background Cyber HUD grid lines -->
  <path d="M 50,50 L 350,50 M 50,140 L 350,140" stroke="#22d3ee" stroke-width="1.5" opacity="0.1" />

  <!-- Glowing JACKPOT Header text -->
  <g transform="translate(200, 48)">
    <text x="0" y="0" font-family="'Outfit', sans-serif" font-size="18" font-weight="900" fill="#ec4899" text-anchor="middle" letter-spacing="4" filter="url(#glow)">JACKPOT</text>
  </g>

  <!-- Futuristic Cabinet Frame -->
  <g transform="translate(100, 56)">
    <!-- Cabinet Body -->
    <rect width="200" height="82" rx="8" fill="#0f172a" stroke="#22d3ee" stroke-width="2.5" filter="url(#glow)" />
    <!-- Sub-boarder -->
    <rect width="192" height="74" x="4" y="4" rx="6" fill="none" stroke="#eab308" stroke-width="1" opacity="0.3" />

    <!-- Reel Dividers -->
    <line x1="66" y1="6" x2="66" y2="76" stroke="#22d3ee" stroke-width="1.5" opacity="0.3" />
    <line x1="132" y1="6" x2="132" y2="76" stroke="#22d3ee" stroke-width="1.5" opacity="0.3" />

    <!-- Reel 1: Double Cherry symbol -->
    <g transform="translate(14, 15)">
      <!-- Cherry Stems -->
      <path d="M 20,6 Q 14,16 10,26 M 20,6 Q 26,16 28,26 M 14,8 Q 23,8 24,14" fill="none" stroke="#39ff14" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
      <!-- Cherry 1 -->
      <circle cx="9" cy="27" r="7" fill="#ff007f" filter="url(#glow)" />
      <!-- Cherry 2 -->
      <circle cx="29" cy="27" r="7" fill="#ff007f" filter="url(#glow)" />
    </g>

    <!-- Reel 2: BAR symbol -->
    <g transform="translate(80, 24)">
      <!-- BAR box -->
      <rect width="40" height="24" rx="4" fill="#1e1b4b" stroke="#eab308" stroke-width="2.5" filter="url(#glow)" />
      <text x="20" y="16" font-family="'Outfit', sans-serif" font-size="11" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="1" filter="url(#glow)">BAR</text>
    </g>

    <!-- Reel 3: Double Cherry symbol (Matching!) -->
    <g transform="translate(146, 15)">
      <!-- Cherry Stems -->
      <path d="M 20,6 Q 14,16 10,26 M 20,6 Q 26,16 28,26 M 14,8 Q 23,8 24,14" fill="none" stroke="#39ff14" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
      <!-- Cherry 1 -->
      <circle cx="9" cy="27" r="7" fill="#ff007f" filter="url(#glow)" />
      <!-- Cherry 2 -->
      <circle cx="29" cy="27" r="7" fill="#ff007f" filter="url(#glow)" />
    </g>
  </g>

  <!-- Side Sparkles and Glow lines -->
  <polygon points="65,90 67,93 71,94 67,95 65,98 63,95 59,94 63,93" fill="#ffffff" filter="url(#glow)"/>
  <polygon points="335,85 337,88 341,89 337,90 335,93 333,90 329,89 333,88" fill="#ffffff" filter="url(#glow)"/>

  <!-- HUD gameplay text -->
  <text x="200" y="166" font-family="'Plus Jakarta Sans', sans-serif" font-size="10" font-weight="bold" fill="#94a3b8" text-anchor="middle" letter-spacing="3">HIGH TECH SLOTS</text>

  <!-- タイトル -->
  
  <!-- カテゴリバッジ -->
  <rect x="150" y="210" width="100" height="18" rx="9" fill="#eab308" opacity="0.2"/>
</svg>
