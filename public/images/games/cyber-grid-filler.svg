<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  
  <rect width="400" height="250" fill="url(#bg-grad)" />
  <rect x="20" y="20" width="360" height="210" rx="12" fill="none" stroke="#39ff14" filter="url(#glow)" stroke-width="2" opacity="0.25" />
  
  <!-- Path Filling Grid visual -->
  <g transform="translate(130, 30)">
    <!-- 4x3 Grid -->
    <!-- Grid squares back -->
    <rect x="0" y="0" width="30" height="30" rx="4" fill="#0f172a" stroke="#39ff14" filter="url(#glow)" stroke-width="1" opacity="0.4"/>
    <rect x="40" y="0" width="30" height="30" rx="4" fill="#0f172a" stroke="#39ff14" filter="url(#glow)" stroke-width="1" opacity="0.4"/>
    <rect x="80" y="0" width="30" height="30" rx="4" fill="#0f172a" stroke="#39ff14" filter="url(#glow)" stroke-width="1" opacity="0.4"/>
    <rect x="120" y="0" width="30" height="30" rx="4" fill="#0f172a" stroke="#39ff14" filter="url(#glow)" stroke-width="1" opacity="0.4"/>
    
    <rect x="0" y="40" width="30" height="30" rx="4" fill="#0f172a" stroke="#39ff14" filter="url(#glow)" stroke-width="1" opacity="0.4"/>
    <rect x="40" y="40" width="30" height="30" rx="4" fill="#0f172a" stroke="#39ff14" filter="url(#glow)" stroke-width="1" opacity="0.4"/>
    <rect x="80" y="40" width="30" height="30" rx="4" fill="#0f172a" stroke="#39ff14" filter="url(#glow)" stroke-width="1" opacity="0.4"/>
    <rect x="120" y="40" width="30" height="30" rx="4" fill="#0f172a" stroke="#39ff14" filter="url(#glow)" stroke-width="1" opacity="0.4"/>
    
    <rect x="0" y="80" width="30" height="30" rx="4" fill="#0f172a" stroke="#39ff14" filter="url(#glow)" stroke-width="1" opacity="0.4"/>
    <rect x="40" y="80" width="30" height="30" rx="4" fill="#0f172a" stroke="#39ff14" filter="url(#glow)" stroke-width="1" opacity="0.4"/>
    <rect x="80" y="80" width="30" height="30" rx="4" fill="#0f172a" stroke="#39ff14" filter="url(#glow)" stroke-width="1" opacity="0.4"/>
    <rect x="120" y="80" width="30" height="30" rx="4" fill="#0f172a" stroke="#39ff14" filter="url(#glow)" stroke-width="1" opacity="0.4"/>
    
    <!-- Path Filled tiles (glowing blue) -->
    <rect x="0" y="0" width="30" height="30" rx="4" fill="#22d3ee" stroke="#22d3ee" stroke-width="2" filter="url(#glow)"/>
    <rect x="0" y="40" width="30" height="30" rx="4" fill="#22d3ee" stroke="#22d3ee" stroke-width="2" filter="url(#glow)"/>
    <rect x="40" y="40" width="30" height="30" rx="4" fill="#22d3ee" stroke="#22d3ee" stroke-width="2" filter="url(#glow)"/>
    <rect x="40" y="0" width="30" height="30" rx="4" fill="#22d3ee" stroke="#22d3ee" stroke-width="2" filter="url(#glow)"/>
    <rect x="80" y="0" width="30" height="30" rx="4" fill="#22d3ee" stroke="#22d3ee" stroke-width="2" filter="url(#glow)"/>
    
    <!-- Active position (Green core) -->
    <circle cx="95" cy="15" r="8" fill="#39ff14" filter="url(#glow)"/>
    <circle cx="95" cy="15" r="4" fill="#ffffff" filter="url(#glow)"/>
    
    <!-- Obstacle cell -->
    <rect x="80" y="80" width="30" height="30" rx="4" fill="#ef4444" opacity="0.5"/>
    <line x1="85" y1="85" x2="105" y2="105" stroke="#ef4444" stroke-width="2" filter="url(#glow)"/>
    <line x1="105" y1="85" x2="85" y2="105" stroke="#ef4444" stroke-width="2" filter="url(#glow)"/>
  </g>
  
  <text x="200" y="166" font-family="'Plus Jakarta Sans', sans-serif" font-size="10" font-weight="bold" fill="#94a3b8" text-anchor="middle" letter-spacing="3">COMPLETE GRID COVERAGE ACTIVE</text>
  <rect x="150" y="210" width="100" height="18" rx="9" fill="#39ff14" opacity="0.2"/>
</svg>
