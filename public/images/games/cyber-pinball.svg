<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- Outer Board Borders -->
  <rect x="250" y="20" width="300" height="360" rx="10" 
        fill="none" stroke="#1e293b" stroke-width="3" />

  <!-- Slingshots (Green triangles) -->
  <polygon points="295,220 315,280 295,280" 
           fill="none" stroke="#39ff14" stroke-width="3" filter="url(#neonGreen)" />
  <polygon points="505,220 485,280 505,280" 
           fill="none" stroke="#39ff14" stroke-width="3" filter="url(#neonGreen)" />

  <!-- Circular Bumpers (Glow) -->
  <!-- Bumper 1 (Cyan) -->
  <circle cx="400" cy="100" r="22" fill="rgba(6, 182, 212, 0.15)" stroke="#06b6d4" stroke-width="4" filter="url(#neonBlue)" />
  <circle cx="400" cy="100" r="10" fill="none" stroke="#06b6d4" stroke-width="2" />
  
  <!-- Bumper 2 (Pink) -->
  <circle cx="340" cy="150" r="16" fill="rgba(244, 63, 94, 0.15)" stroke="#ff007f" stroke-width="4" filter="url(#neonPink)" />
  <circle cx="340" cy="150" r="7" fill="none" stroke="#ff007f" filter="url(#glow)" stroke-width="2" />

  <!-- Bumper 3 (Pink) -->
  <circle cx="460" cy="150" r="16" fill="rgba(244, 63, 94, 0.15)" stroke="#ff007f" stroke-width="4" filter="url(#neonPink)" />
  <circle cx="460" cy="150" r="7" fill="none" stroke="#ff007f" filter="url(#glow)" stroke-width="2" />

  <!-- Left and Right Flippers -->
  <!-- Left Flipper (Cyan, raised angle) -->
  <g transform="translate(350, 320) rotate(-15)">
    <line x1="0" y1="0" x2="55" y2="0" stroke="#06b6d4" stroke-width="7" stroke-linecap="round" filter="url(#neonBlue)" />
  </g>
  <circle cx="350" cy="320" r="5" fill="#ffffff" />

  <!-- Right Flipper (Pink, flat angle) -->
  <g transform="translate(450, 320) rotate(195)">
    <line x1="0" y1="0" x2="55" y2="0" stroke="#ff007f" stroke-width="7" stroke-linecap="round" filter="url(#neonPink)" />
  </g>
  <circle cx="450" cy="320" r="5" fill="#ffffff" />

  <!-- Metallic Pinball Ball -->
  <g transform="translate(380, 240)">
    <circle cx="0" cy="0" r="9" fill="#ffffff" filter="url(#neonBlue)" />
    <circle cx="-3" cy="-3" r="2.5" fill="rgba(255,255,255,0.8)" />
  </g>

  <!-- Title Texts -->
</svg>
