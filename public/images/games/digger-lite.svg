<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  

  <!-- Background -->
  <rect width="400" height="250" fill="url(#bg-grad)" />

  <!-- Outer Border -->
  <rect x="20" y="20" width="360" height="210" rx="12" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.25" />

  <!-- Underground Blocky Grid -->
  <!-- Block Grid outlines -->
  <path d="M 60,35 L 60,155 M 100,35 L 100,155 M 140,35 L 140,155 M 180,35 L 180,155 M 220,35 L 220,155 M 260,35 L 260,155 M 300,35 L 300,155 M 340,35 L 340,155" stroke="#fbbf24" stroke-width="1.5" opacity="0.1" />
  <path d="M 60,35 L 340,35 M 60,75 L 340,75 M 60,115 L 340,115 M 60,155 L 340,155" stroke="#fbbf24" stroke-width="1.5" opacity="0.1" />

  <!-- Excavated cavern paths (Dug paths) -->
  <rect x="100" y="75" width="80" height="40" fill="#070a13" stroke="#fbbf24" stroke-width="1" opacity="0.2" />
  <rect x="180" y="75" width="80" height="80" fill="#070a13" stroke="#fbbf24" stroke-width="1" opacity="0.2" />

  <!-- Buried Cyan Diamonds -->
  <!-- Diamond 1 -->
  <g transform="translate(130, 95)">
    <polygon points="0,-8 6,0 0,8 -6,0" fill="#22d3ee" filter="url(#glow)"/>
    <!-- Outer sparkle rays -->
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#22d3ee" stroke-width="0.8" opacity="0.8" />
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#22d3ee" stroke-width="0.8" opacity="0.8" />
  </g>
  <!-- Diamond 2 -->
  <g transform="translate(220, 115)">
    <polygon points="0,-8 6,0 0,8 -6,0" fill="#22d3ee" filter="url(#glow)"/>
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#22d3ee" stroke-width="0.8" opacity="0.8" />
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#22d3ee" stroke-width="0.8" opacity="0.8" />
  </g>
  <!-- Diamond 3 -->
  <g transform="translate(240, 95)">
    <polygon points="0,-6 4,0 0,6 -4,0" fill="#22d3ee" filter="url(#glow)"/>
  </g>

  <!-- Pickaxe striking a block -->
  <g transform="translate(195, 75) rotate(-25)">
    <!-- Pickaxe Head -->
    <path d="M -16,-6 C -6,-16 6,-16 16,-6" fill="none" stroke="#eab308" stroke-width="4.5" stroke-linecap="round" filter="url(#glow)"/>
    <!-- Pickaxe Head center iron -->
    <rect x="-3" y="-12" width="6" height="4" fill="#fbbf24" />
    <!-- Pickaxe Handle -->
    <line x1="0" y1="-10" x2="0" y2="28" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
    <!-- Impact Sparks -->
    <g transform="translate(0, -15)">
      <circle cx="-10" cy="-5" r="1.5" fill="#ffffff" filter="url(#glow)" />
      <circle cx="10" cy="-5" r="1.5" fill="#ffffff" filter="url(#glow)" />
      <circle cx="0" cy="-12" r="2" fill="#eab308" filter="url(#glow)" />
    </g>
  </g>

  <!-- Mining cue -->
  <text x="200" y="167" font-family="'Plus Jakarta Sans', sans-serif" font-size="10" font-weight="bold" fill="#94a3b8" text-anchor="middle" letter-spacing="3">DEEP DIAMOND DIG</text>

  <!-- タイトル -->
  
  <!-- カテゴリバッジ -->
  <rect x="150" y="210" width="100" height="18" rx="9" fill="#fbbf24" opacity="0.2"/>
</svg>