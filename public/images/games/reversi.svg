<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  
  <!-- 背景 -->
  <rect width="400" height="250" fill="#090d16"/>
  <rect x="20" y="20" width="360" height="210" rx="12" fill="none" stroke="#39ff14" filter="url(#glow)" stroke-width="1.5" opacity="0.25" />

  <!-- リバーシのシミュレーションイラスト -->
  <g transform="translate(100, 25)">
    <!-- ボードの緑のネオングリッド (4x4を美しく表現) -->
    <rect width="200" height="120" fill="#022c22" stroke="#39ff14" stroke-width="2.5" rx="6" filter="url(#glow)"/>
    <line x1="50" y1="0" x2="50" y2="120" stroke="#39ff14" filter="url(#glow)" stroke-width="1" opacity="0.7"/>
    <line x1="100" y1="0" x2="100" y2="120" stroke="#39ff14" filter="url(#glow)" stroke-width="1" opacity="0.7"/>
    <line x1="150" y1="0" x2="150" y2="120" stroke="#39ff14" filter="url(#glow)" stroke-width="1" opacity="0.7"/>

    <line x1="0" y1="30" x2="200" y2="30" stroke="#39ff14" filter="url(#glow)" stroke-width="1" opacity="0.7"/>
    <line x1="0" y1="60" x2="200" y2="60" stroke="#39ff14" filter="url(#glow)" stroke-width="1" opacity="0.7"/>
    <line x1="0" y1="90" x2="200" y2="90" stroke="#39ff14" filter="url(#glow)" stroke-width="1" opacity="0.7"/>

    <!-- 静的なオセロ石 -->
    <!-- 黒石 (ネオンブルーのコア、暗い本体) -->
    <circle cx="25" cy="45" r="10" fill="#090d16" stroke="#3b82f6" stroke-width="3" filter="url(#glow)" />
    <circle cx="75" cy="15" r="10" fill="#090d16" stroke="#3b82f6" stroke-width="3" filter="url(#glow)" />
    <!-- 白石 (ネオンホワイトのコア) -->
    <circle cx="25" cy="75" r="10" fill="#1e293b" stroke="#ffffff" stroke-width="3" filter="url(#glow)" />
    <circle cx="75" cy="45" r="10" fill="#1e293b" stroke="#ffffff" stroke-width="3" filter="url(#glow)" />

    <!-- ひっくり返るダイナミックな石！ (白と黒が縦に半分ずつグラデーション、あるいは回転軌跡) -->
    <!-- 挟まれた位置: 75,75 -->
    <!-- ひっくり返るスピンネオン軌跡 -->
    <path d="M 55,75 C 55,55, 95,55, 95,75" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="3, 2" filter="url(#glow)" />
    <!-- 斜めに回転している中間のオセロ石 (楕円で回転中を表現) -->
    <ellipse cx="75" cy="75" rx="4" ry="11" transform="rotate(30, 75, 75)" fill="#1e293b" stroke="#ffffff" stroke-width="2.5" filter="url(#glow)"/>
    <ellipse cx="75" cy="75" rx="3" ry="10" transform="rotate(30, 75, 75)" fill="#090d16" opacity="0.5"/>

    <!-- 新たに置かれた決定的な黒石 (輝く) -->
    <circle cx="125" cy="75" r="10" fill="#090d16" stroke="#3b82f6" stroke-width="3.5" filter="url(#glow)" />
    <!-- 衝撃波 (円の同心円) -->
    <circle cx="125" cy="75" r="15" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3, 2" opacity="0.6" filter="url(#glow)" />
  </g>

  <!-- タイトル -->
  <!-- カテゴリバッジ -->
  <rect x="150" y="210" width="100" height="18" rx="9" fill="#39ff14" opacity="0.2"/>
</svg>