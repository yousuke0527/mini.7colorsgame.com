<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  
  <!-- 背景 -->
  <rect width="400" height="300" fill="#090d16" />
  <rect width="380" height="280" x="10" y="10" rx="15" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5" opacity="0.3" />

  <!-- メモリーパスV2のシミュレーションイラスト -->
  <g transform="translate(100, 20)">
    <!-- 画面バウンディング枠 -->
    <rect width="200" height="140" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1" rx="4" />

    <!-- 4x4 グリッドノード (背景の暗い丸) -->
    <g fill="#1e293b" opacity="0.4">
      <!-- 行0 -->
      <circle cx="25" cy="20" r="8" />
      <circle cx="75" cy="20" r="8" />
      <circle cx="125" cy="20" r="8" />
      <circle cx="175" cy="20" r="8" />
      <!-- 行1 -->
      <circle cx="25" cy="55" r="8" />
      <circle cx="75" cy="55" r="8" />
      <circle cx="125" cy="55" r="8" />
      <circle cx="175" cy="55" r="8" />
      <!-- 行2 -->
      <circle cx="25" cy="90" r="8" />
      <circle cx="75" cy="90" r="8" />
      <circle cx="125" cy="90" r="8" />
      <circle cx="175" cy="90" r="8" />
      <!-- 行3 -->
      <circle cx="25" cy="125" r="8" />
      <circle cx="75" cy="125" r="8" />
      <circle cx="125" cy="125" r="8" />
      <circle cx="175" cy="125" r="8" />
    </g>

    <!-- 記憶する正しいルート (シアンの光るライン) -->
    <!-- ルート: (25,125)[START] -> (25,90) -> (75,90) -> (75,55) -> (125,55) -> (125,20) -> (175,20)[GOAL] -->
    <path d="M 25,125 L 25,90 L 75,90 L 75,55 L 125,55 L 125,20 L 175,20" fill="none" stroke="#22d3ee" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)" />
    
    <!-- 点滅する現在進行中のライン (アニメーション風のダッシュライン) -->
    <path d="M 25,125 L 25,90 L 75,90 L 75,55 L 125,55 L 125,20 L 175,20" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="10, 8" opacity="0.8" />

    <!-- アクティブなノードたち -->
    <!-- STARTノード (緑) -->
    <circle cx="25" cy="125" r="10" fill="#22c55e" filter="url(#glow)" />
    <circle cx="25" cy="125" r="4" fill="#ffffff" />
    <text x="25" y="143" font-family="'Outfit', sans-serif" font-size="8" font-weight="bold" fill="#22c55e" text-anchor="middle">START</text>

    <!-- 中間ノード (シアン) -->
    <circle cx="25" cy="90" r="9" fill="#06b6d4" opacity="0.8" />
    <circle cx="75" cy="90" r="9" fill="#06b6d4" opacity="0.8" />
    <circle cx="75" cy="55" r="9" fill="#06b6d4" opacity="0.8" />
    <circle cx="125" cy="55" r="9" fill="#06b6d4" opacity="0.8" />
    <circle cx="125" cy="20" r="9" fill="#06b6d4" opacity="0.8" />

    <!-- GOALノード (マゼンタ) -->
    <circle cx="175" cy="20" r="10" fill="#ec4899" filter="url(#glow)" />
    <circle cx="175" cy="20" r="4" fill="#ffffff" />
    <text x="175" y="38" font-family="'Outfit', sans-serif" font-size="8" font-weight="bold" fill="#ec4899" text-anchor="middle">GOAL</text>

    <!-- 現在地マーカー (白熱のパーティクル) -->
    <circle cx="125" cy="55" r="12" fill="none" stroke="#ffffff" stroke-width="2" filter="url(#glow)" />
  </g>

  <!-- タイトル・カテゴリ -->
</svg>
