<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  
  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- Board Outline -->
  <rect x="235" y="45" width="330" height="280" rx="10" fill="rgba(15, 23, 42, 0.4)" stroke="#1e293b" stroke-width="2" />

  <!-- Grid Rows of Neon Gems -->
  <g transform="translate(250, 60)">
    <!-- Cyan Diamond -->
    <path d="M 25,5 L 45,25 L 25,45 L 5,25 Z" fill="none" stroke="#22d3ee" stroke-width="3" filter="url(#glowCyan)" />
    <!-- Pink Circle -->
    <circle cx="95" cy="25" r="18" fill="none" stroke="#d946ef" stroke-width="3" filter="url(#glowPink)" />
    <!-- Yellow Star -->
    <polygon points="165,8 170,18 180,20 172,27 175,37 165,31 155,37 158,27 150,20 160,18" fill="none" stroke="#eab308" stroke-width="3" filter="url(#glowYellow)" />
    <!-- Green Triangle -->
    <polygon points="235,8 253,38 217,38" fill="none" stroke="#39ff14" stroke-width="3" filter="url(#glowGreen)" />
    <!-- Cyan Diamond -->
    <path d="M 305,5 L 325,25 L 305,45 L 285,25 Z" fill="none" stroke="#22d3ee" stroke-width="3" filter="url(#glowCyan)" opacity="0.4" />

    <!-- Row 2 -->
    <!-- Green Triangle -->
    <polygon points="25,68 43,98 7,98" fill="none" stroke="#39ff14" stroke-width="3" filter="url(#glowGreen)" />
    <!-- Yellow Star -->
    <polygon points="95,68 100,78 110,80 102,87 105,97 95,91 85,97 88,87 80,80 90,78" fill="none" stroke="#eab308" stroke-width="3" filter="url(#glowYellow)" />
    <!-- Pink Circle -->
    <circle cx="165" cy="85" r="18" fill="none" stroke="#d946ef" stroke-width="3" filter="url(#glowPink)" />
    <!-- Cyan Diamond -->
    <path d="M 235,65 L 255,85 L 235,105 L 215,85 Z" fill="none" stroke="#22d3ee" stroke-width="3" filter="url(#glowCyan)" />
    <!-- Green Triangle -->
    <polygon points="305,68 323,98 287,98" fill="none" stroke="#39ff14" stroke-width="3" filter="url(#glowGreen)" opacity="0.4" />

    <!-- Row 3: Matching Row (Yellow Stars) -->
    <!-- Pink Circle -->
    <circle cx="25" cy="145" r="18" fill="none" stroke="#d946ef" stroke-width="3" filter="url(#glowPink)" />
    <!-- Yellow Star (Match 1) -->
    <polygon points="95,128 100,138 110,140 102,147 105,157 95,151 85,157 88,147 80,140 90,138" fill="none" stroke="#eab308" stroke-width="3" filter="url(#glowYellow)" />
    <!-- Yellow Star (Match 2) -->
    <polygon points="165,128 170,138 180,140 172,147 175,157 165,151 155,157 158,147 150,140 160,138" fill="none" stroke="#eab308" stroke-width="3" filter="url(#glowYellow)" />
    <!-- Yellow Star (Match 3) -->
    <polygon points="235,128 238,138 248,140 240,147 243,157 233,151 223,157 226,147 218,140 228,138" fill="none" stroke="#eab308" stroke-width="3" filter="url(#glowYellow)" />
    <!-- Connection / Match Highlights -->
    <line x1="95" y1="145" x2="235" y2="145" stroke="#ffffff" stroke-width="2.5" stroke-dasharray="5,3" filter="url(#glowYellow)" />
    <circle cx="165" cy="145" r="24" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.8" filter="url(#glowYellow)" />
    <!-- Cyan Diamond -->
    <path d="M 305,125 L 325,145 L 305,165 L 285,145 Z" fill="none" stroke="#22d3ee" stroke-width="3" filter="url(#glowCyan)" opacity="0.4" />

    <!-- Row 4 -->
    <!-- Yellow Star -->
    <polygon points="25,188 30,198 40,200 32,207 35,217 25,211 15,217 18,207 10,200 20,198" fill="none" stroke="#eab308" stroke-width="3" filter="url(#glowYellow)" />
    <!-- Green Triangle -->
    <polygon points="95,188 113,218 77,218" fill="none" stroke="#39ff14" stroke-width="3" filter="url(#glowGreen)" />
    <!-- Cyan Diamond -->
    <path d="M 165,185 L 185,205 L 165,225 L 145,205 Z" fill="none" stroke="#22d3ee" stroke-width="3" filter="url(#glowCyan)" />
    <!-- Pink Circle -->
    <circle cx="235" cy="205" r="18" fill="none" stroke="#d946ef" stroke-width="3" filter="url(#glowPink)" />
    <!-- Yellow Star -->
    <polygon points="305,188 310,198 320,200 312,207 315,217 305,211 295,217 298,207 290,200 300,198" fill="none" stroke="#eab308" stroke-width="3" filter="url(#glowYellow)" opacity="0.4" />
  </g>

  <!-- Sparkles -->
  <g fill="#ffffff" filter="url(#glowYellow)">
    <circle cx="410" cy="180" r="3" />
    <circle cx="430" cy="220" r="2.5" />
    <circle cx="370" cy="210" r="2" />
  </g>

  <!-- Text Labels -->
</svg>
