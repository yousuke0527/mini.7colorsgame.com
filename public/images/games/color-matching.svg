<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  
  <!-- 背景 -->
  <rect width="400" height="250" fill="#090d16"/>
  <rect x="20" y="20" width="360" height="210" rx="12" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.25" />

  <!-- カラーマッチングのシミュレーションイラスト -->
  <g transform="translate(100, 25)">
    <!-- 画面バウンディング枠 -->
    <rect width="200" height="120" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1" rx="4" />

    <!-- グリッド背景の点 -->
    <circle cx="40" cy="30" r="2" fill="#334155" />
    <circle cx="100" cy="30" r="2" fill="#334155" />
    <circle cx="160" cy="30" r="2" fill="#334155" />
    <circle cx="40" cy="90" r="2" fill="#334155" />
    <circle cx="100" cy="90" r="2" fill="#334155" />
    <circle cx="160" cy="90" r="2" fill="#334155" />

    <!-- 異種カラーノード (非マッチ) -->
    <circle cx="40" cy="30" r="10" fill="#2d061e" stroke="#ec4899" stroke-width="2" filter="url(#glow)" />
    <circle cx="160" cy="90" r="10" fill="#78350f" stroke="#eab308" stroke-width="2" filter="url(#glow)" />

    <!-- マッチング成功ライン (3つの緑ノードが縦に整列) -->
    <!-- 接続レーザービーム -->
    <line x1="100" y1="20" x2="100" y2="100" stroke="#22c55e" stroke-width="3" filter="url(#glow)" />
    <line x1="100" y1="20" x2="100" y2="100" stroke="#ffffff" stroke-width="1" />

    <!-- ノード1 (グリーン) -->
    <circle cx="100" cy="30" r="12" fill="#064e3b" stroke="#22c55e" stroke-width="2.5" filter="url(#glow)" />
    <circle cx="100" cy="30" r="4" fill="#ffffff" />

    <!-- ノード2 (グリーン - ロックオン) -->
    <circle cx="100" cy="60" r="12" fill="#064e3b" stroke="#22c55e" stroke-width="2.5" filter="url(#glow)" />
    <circle cx="100" cy="60" r="4" fill="#ffffff" />
    <!-- ターゲット照準 -->
    <circle cx="100" cy="60" r="20" fill="none" stroke="#ffffff" stroke-width="1.5" filter="url(#glow)" />
    <path d="M 100,36 L 100,44 M 100,76 L 100,84 M 76,60 L 84,60 M 116,60 L 124,60" stroke="#22c55e" stroke-width="2" />

    <!-- ノード3 (グリーン) -->
    <circle cx="100" cy="90" r="12" fill="#064e3b" stroke="#22c55e" stroke-width="2.5" filter="url(#glow)" />
    <circle cx="100" cy="90" r="4" fill="#ffffff" />

    <!-- 消滅エフェクト火花 -->
    <path d="M 90,20 L 80,10 M 110,20 L 120,10 M 90,100 L 80,110 M 110,100 L 120,110" stroke="#ffffff" stroke-width="1.5" filter="url(#glow)" />
  </g>

  <!-- タイトル -->
  <!-- カテゴリバッジ -->
  <rect x="150" y="210" width="100" height="18" rx="9" fill="#22c55e" opacity="0.2"/>
</svg>