<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  
  <!-- 背景 -->
  <rect width="400" height="300" fill="#090d16" />
  <rect width="380" height="280" x="10" y="10" rx="15" fill="#0f172a" stroke="#eab308" stroke-width="1.5" opacity="0.3" />

  <!-- ブロックスライドのシミュレーションイラスト -->
  <g transform="translate(100, 20)">
    <!-- 6x6パズルボード枠 (黄色ネオン) -->
    <rect width="200" height="150" fill="#1e293b" stroke="#eab308" stroke-width="3" rx="8" filter="url(#glow)" />
    
    <!-- 脱出ゲート（右側の隙間） -->
    <rect width="10" height="25" x="200" y="62.5" fill="none" stroke="#ef4444" stroke-width="2" filter="url(#glow)" />
    <path d="M 200,75 L 215,75 M 210,70 L 215,75 L 210,80" fill="none" stroke="#ef4444" stroke-width="2.5" filter="url(#glow)" />

    <!-- 内部グリッド背景線 -->
    <line x1="33.3" y1="0" x2="33.3" y2="150" stroke="#334155" stroke-width="1" stroke-dasharray="2, 2" />
    <line x1="66.6" y1="0" x2="66.6" y2="150" stroke="#334155" stroke-width="1" stroke-dasharray="2, 2" />
    <line x1="99.9" y1="0" x2="99.9" y2="150" stroke="#334155" stroke-width="1" stroke-dasharray="2, 2" />
    <line x1="133.2" y1="0" x2="133.2" y2="150" stroke="#334155" stroke-width="1" stroke-dasharray="2, 2" />
    <line x1="166.5" y1="0" x2="166.5" y2="150" stroke="#334155" stroke-width="1" stroke-dasharray="2, 2" />

    <line x1="0" y1="25" x2="200" y2="25" stroke="#334155" stroke-width="1" stroke-dasharray="2, 2" />
    <line x1="0" y1="50" x2="200" y2="50" stroke="#334155" stroke-width="1" stroke-dasharray="2, 2" />
    <line x1="0" y1="75" x2="200" y2="75" stroke="#334155" stroke-width="1" stroke-dasharray="2, 2" />
    <line x1="0" y1="100" x2="200" y2="100" stroke="#334155" stroke-width="1" stroke-dasharray="2, 2" />
    <line x1="0" y1="125" x2="200" y2="125" stroke="#334155" stroke-width="1" stroke-dasharray="2, 2" />

    <!-- 障害物ブロック1 (縦2マス, シアン) -->
    <rect x="0" y="25" width="31" height="48" rx="4" fill="#0f172a" stroke="#06b6d4" stroke-width="2.5" filter="url(#glow)" />
    
    <!-- 障害物ブロック2 (横3マス, パープル) -->
    <rect x="35.3" y="0" width="94" height="23" rx="4" fill="#0f172a" stroke="#a855f7" stroke-width="2.5" filter="url(#glow)" />

    <!-- 障害物ブロック3 (縦3マス, シアン) -->
    <rect x="135.2" y="50" width="31" height="72" rx="4" fill="#0f172a" stroke="#06b6d4" stroke-width="2.5" filter="url(#glow)" />

    <!-- 脱出ターゲット・キーブロック (横2マス, 赤ネオン - 右へスライドする様子) -->
    <g transform="translate(68.6, 51.5)">
      <rect width="61.3" height="22" rx="4" fill="url(#red-grad)" stroke="#ffffff" stroke-width="2" filter="url(#glow)" />
      <!-- 移動方向の動的矢印 -->
      <path d="M 40,11 L 52,11 M 48,7 L 52,11 L 48,15" fill="none" stroke="#ffffff" stroke-width="2" />
    </g>

    <!-- 障害物ブロック4 (横2マス, パープル) -->
    <rect x="0" y="100" width="63.3" height="23" rx="4" fill="#0f172a" stroke="#a855f7" stroke-width="2.5" filter="url(#glow)" />
  </g>

  <!-- タイトル・カテゴリ -->
</svg>