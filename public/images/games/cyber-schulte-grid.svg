<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  
  <rect width="800" height="450" fill="url(#bgGrad)" />
  <!-- Grid representation -->
  <g transform="translate(250, 60)" filter="url(#glowCyan)">
    <!-- Grid borders -->
    <rect width="300" height="240" fill="none" stroke="#22d3ee" stroke-width="4" rx="8" />
    <line x1="100" y1="0" x2="100" y2="240" stroke="#22d3ee" stroke-width="2" opacity="0.6" />
    <line x1="200" y1="0" x2="200" y2="240" stroke="#22d3ee" stroke-width="2" opacity="0.6" />
    <line x1="0" y1="80" x2="300" y2="80" stroke="#22d3ee" stroke-width="2" opacity="0.6" />
    <line x1="0" y1="160" x2="300" y2="160" stroke="#22d3ee" stroke-width="2" opacity="0.6" />
    <!-- Random Numbers -->
    <text x="50" y="50" font-family="Outfit, sans-serif" font-weight="800" font-size="28" fill="#e2e8f0" text-anchor="middle">14</text>
    <text x="150" y="50" font-family="Outfit, sans-serif" font-weight="800" font-size="28" fill="#39ff14" text-anchor="middle">1</text>
    <text x="250" y="50" font-family="Outfit, sans-serif" font-weight="800" font-size="28" fill="#e2e8f0" text-anchor="middle">22</text>
    
    <text x="50" y="130" font-family="Outfit, sans-serif" font-weight="800" font-size="28" fill="#e2e8f0" text-anchor="middle">9</text>
    <text x="150" y="130" font-family="Outfit, sans-serif" font-weight="800" font-size="28" fill="#e2e8f0" text-anchor="middle">18</text>
    <text x="250" y="130" font-family="Outfit, sans-serif" font-weight="800" font-size="28" fill="#39ff14" text-anchor="middle">2</text>

    <text x="50" y="210" font-family="Outfit, sans-serif" font-weight="800" font-size="28" fill="#e2e8f0" text-anchor="middle">5</text>
    <text x="150" y="210" font-family="Outfit, sans-serif" font-weight="800" font-size="28" fill="#e2e8f0" text-anchor="middle">12</text>
    <text x="250" y="210" font-family="Outfit, sans-serif" font-weight="800" font-size="28" fill="#e2e8f0" text-anchor="middle">25</text>
  </g>
</svg>
