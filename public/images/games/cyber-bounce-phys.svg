<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  
  <rect width="800" height="450" fill="url(#bgGrad)" />
  <!-- Emitter, bounce line, bouncing ball, goal receiver -->
  <g transform="translate(100, 40)">
    <!-- Yellow Emitter -->
    <circle cx="50" cy="50" r="18" fill="#eab308" stroke="#ffffff" stroke-width="2" />
    <path d="M 50,50 L 80,100" stroke="#eab308" stroke-width="4" stroke-dasharray="4 4" />

    <!-- Trampoline Bounce Line -->
    <path d="M 120,240 L 320,180" stroke="#eab308" stroke-width="8" stroke-linecap="round" filter="url(#glowBlue)" />

    <!-- Trajectory of balls -->
    <!-- Ball 1 -->
    <circle cx="220" cy="180" r="10" fill="#00f0ff" stroke="#ffffff" stroke-width="2" filter="url(#glowBlue)" />
    <!-- Ball 2 -->
    <circle cx="340" cy="140" r="8" fill="#00f0ff" stroke="#ffffff" stroke-width="1.5" opacity="0.6" />
    <!-- Ball 3 entering goal -->
    <circle cx="440" cy="200" r="8" fill="#00f0ff" stroke="#ffffff" stroke-width="1.5" opacity="0.4" />

    <!-- Goal Receiver (Green) -->
    <g transform="translate(420, 210)" filter="url(#glowGreen)">
      <rect width="90" height="60" rx="8" fill="#064e3b" stroke="#34d399" stroke-width="4" />
      <text x="45" y="36" font-family="Outfit, sans-serif" font-weight="800" font-size="12" fill="#ffffff" text-anchor="middle">RECEIVER</text>
    </g>
  </g>
</svg>
