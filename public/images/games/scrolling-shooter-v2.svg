<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  

  <!-- Background -->
  <rect width="400" height="250" fill="url(#bg-grad)" />

  <!-- Cybernetic Grid -->
  <g opacity="0.05">
    <path d="M 15 45 L 385 45 M 15 80 L 385 80 M 15 115 L 385 115 M 15 150 L 385 150 M 15 185 L 385 185" stroke="#ffffff" stroke-width="1" />
    <path d="M 50 15 L 50 235 M 100 15 L 100 235 M 150 15 L 150 235 M 200 15 L 200 235 M 250 15 L 250 235 M 300 15 L 300 235 M 350 15 L 350 235" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Outer Card Border with Amber Glow -->
  <rect x="15" y="15" width="370" height="220" rx="16" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.3" filter="url(#glow)" />

  <!-- Menacing Boss Spaceship (Top Center) -->
  <g filter="url(#glow)">
    <!-- Main Hull (Heavy Orange Outline) -->
    <path d="M 120 28 
             L 280 28 
             L 270 42 
             L 245 54 
             L 200 60 
             L 155 54 
             L 130 42 Z" 
          fill="#090d16" stroke="#fbbf24" stroke-width="2.5" stroke-linejoin="round" />
    
    <!-- Red glowing warning nodes on Boss wing tips -->
    <circle cx="140" cy="38" r="3" fill="#ef4444" />
    <circle cx="260" cy="38" r="3" fill="#ef4444" />
    
    <!-- Core Engine Core (Amber/Orange Glow) -->
    <rect x="185" y="24" width="30" height="6" rx="1" fill="#f97316" />
    
    <!-- Heavy armored side gun pods -->
    <path d="M 125 28 L 115 46 M 275 28 L 285 46" stroke="#fbbf24" stroke-width="2" />
  </g>

  <!-- Massive Boss Laser Blast (Downwards) -->
  <g filter="url(#glow)">
    <!-- Orange column of destruction -->
    <line x1="200" y1="58" x2="200" y2="108" stroke="#f97316" stroke-width="7.5" stroke-linecap="round" />
    <line x1="200" y1="58" x2="200" y2="108" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Bullet Barrage (Rose and Purple Orbs filling lanes) -->
  <g filter="url(#glow)">
    <!-- Rose projectiles -->
    <circle cx="115" cy="85" r="4.5" fill="#ffffff" stroke="#ff007f" filter="url(#glow)" stroke-width="2" />
    <circle cx="150" cy="115" r="4" fill="#ffffff" stroke="#ff007f" filter="url(#glow)" stroke-width="1.5" />
    <path d="M 115 80 L 115 70 M 150 110 L 150 102" stroke="#ff007f" filter="url(#glow)" stroke-width="1" opacity="0.6" />

    <!-- Purple projectiles -->
    <circle cx="285" cy="85" r="4.5" fill="#ffffff" stroke="#a855f7" stroke-width="2" />
    <circle cx="250" cy="115" r="4" fill="#ffffff" stroke="#a855f7" stroke-width="1.5" />
    <path d="M 285 80 L 285 70 M 250 110 L 250 102" stroke="#a855f7" stroke-width="1" opacity="0.6" />
  </g>

  <!-- Player Spaceship & Hexagonal Shield Matrix (Bottom Center) -->
  <g transform="translate(0, -6)">
    <!-- Hexagonal energy shield barrier (protecting player ship) -->
    <!-- Triggering collision animation with boss laser at y=114 -->
    <g filter="url(#glow)">
      <!-- Hexagon matrix fill -->
      <path d="M 165 142 C 165 114, 180 108, 200 108 C 220 108, 235 114, 235 142 Z" fill="url(#shield-hex)" opacity="0.8" />
      
      <!-- Glowing cyan arc rim -->
      <path d="M 168 140 C 168 114, 182 108, 200 108 C 218 108, 232 114, 232 140" fill="none" stroke="#00f0ff" filter="url(#glow)" stroke-width="3" stroke-linecap="round" />
      <path d="M 172 135 C 172 118, 184 112, 200 112 C 216 112, 228 118, 228 135" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.7" />
    </g>

    <!-- Laser Impact Explosion Shockwaves -->
    <g transform="translate(200, 108)" filter="url(#glow)">
      <ellipse cx="0" cy="0" rx="14" ry="5" fill="none" stroke="#ffffff" stroke-width="2.5" />
      
      <!-- Tiny spark lines shooting diagonally up -->
      <line x1="0" y1="0" x2="-18" y2="-12" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" />
      <line x1="0" y1="0" x2="18" y2="-12" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" />
      <circle cx="-22" cy="-14" r="1" fill="#ffffff" />
      <circle cx="22" cy="-14" r="1" fill="#ffffff" />
    </g>

    <!-- Upgraded Player Spaceship Outline -->
    <g transform="translate(0, 5)" filter="url(#glow)">
      <!-- Engine booster flame -->
      <polygon points="196,152 200,166 204,152" fill="#ffffff" stroke="#00f0ff" filter="url(#glow)" stroke-width="2" />
      
      <!-- Ship Chassis -->
      <path d="M 200 125 
               L 194 136 
               L 182 142 
               L 174 150 
               L 184 150 
               L 194 145 
               L 200 152 
               L 206 145 
               L 216 150 
               L 226 150 
               L 218 142 
               L 206 136 Z" 
            fill="#090d16" stroke="#00f0ff" filter="url(#glow)" stroke-width="2.5" stroke-linejoin="round" />
      
      <!-- Cyan booster nozzles -->
      <circle cx="187" cy="148" r="1.5" fill="#ffffff" />
      <circle cx="213" cy="148" r="1.5" fill="#ffffff" />
    </g>
  </g>

  <!-- Title -->
  
  <!-- Category Badge -->
  <rect x="150" y="210" width="100" height="18" rx="9" fill="#fbbf24" opacity="0.2"/>
</svg>
