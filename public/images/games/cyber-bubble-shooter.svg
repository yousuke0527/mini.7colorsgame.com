<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  
  <rect width="400" height="250" fill="#090d16"/>
  <rect x="20" y="20" width="360" height="210" rx="12" fill="none" stroke="#e0f2fe" stroke-width="1.5" opacity="0.25" />
  <g transform="translate(100, 25)">
    <!-- バブルたち -->
    <circle cx="20" cy="20" r="12" fill="#ec4899" opacity="0.3" stroke="#ec4899" stroke-width="2" filter="url(#glow)"/>
    <circle cx="50" cy="20" r="12" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="2" filter="url(#glow)"/>
    <circle cx="80" cy="20" r="12" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="2" filter="url(#glow)"/>
    <circle cx="110" cy="20" r="12" fill="#39ff14" opacity="0.3" stroke="#39ff14" stroke-width="2" filter="url(#glow)"/>
    <circle cx="140" cy="20" r="12" fill="#ec4899" opacity="0.3" stroke="#ec4899" stroke-width="2" filter="url(#glow)"/>
    <circle cx="170" cy="20" r="12" fill="#eab308" opacity="0.3" stroke="#eab308" stroke-width="2" filter="url(#glow)"/>
    <circle cx="35" cy="45" r="12" fill="#ec4899" opacity="0.3" stroke="#ec4899" stroke-width="2" filter="url(#glow)"/>
    <circle cx="65" cy="45" r="12" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="2" filter="url(#glow)"/>
    <circle cx="95" cy="45" r="12" fill="#39ff14" opacity="0.3" stroke="#39ff14" stroke-width="2" filter="url(#glow)"/>
    <circle cx="125" cy="45" r="12" fill="#eab308" opacity="0.3" stroke="#eab308" stroke-width="2" filter="url(#glow)"/>
    <circle cx="155" cy="45" r="12" fill="#eab308" opacity="0.3" stroke="#eab308" stroke-width="2" filter="url(#glow)"/>
    <!-- シューター -->
    <line x1="100" y1="130" x2="65" y2="70" stroke="#3b82f6" stroke-width="2" stroke-dasharray="3, 3" filter="url(#glow)"/>
    <circle cx="65" cy="70" r="12" fill="#3b82f6" opacity="0.8" stroke="#3b82f6" stroke-width="2" filter="url(#glow)"/>
    <polygon points="100,110 93,135 107,135" fill="#a855f7" filter="url(#glow)"/>
  </g>
  <rect x="150" y="210" width="100" height="18" rx="9" fill="#ff007f" opacity="0.2"/>
</svg>
