<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  
  <rect width="400" height="300" fill="#090d16" />
  <rect width="380" height="280" x="10" y="10" rx="15" fill="#0f172a" stroke="#a855f7" stroke-width="1.5" opacity="0.3" />

  <!-- KenKen グリッド -->
  <g transform="translate(130, 25)">
    <!-- 4x4 グリッド -->
    <rect width="140" height="140" fill="#0f172a" stroke="#1e293b" stroke-width="1" />
    <line x1="35" y1="0" x2="35" y2="140" stroke="#1e293b" stroke-width="0.5" />
    <line x1="70" y1="0" x2="70" y2="140" stroke="#1e293b" stroke-width="0.5" />
    <line x1="105" y1="0" x2="105" y2="140" stroke="#1e293b" stroke-width="0.5" />
    
    <line x1="0" y1="35" x2="140" y2="35" stroke="#1e293b" stroke-width="0.5" />
    <line x1="0" y1="70" x2="140" y2="70" stroke="#1e293b" stroke-width="0.5" />
    <line x1="0" y1="105" x2="140" y2="105" stroke="#1e293b" stroke-width="0.5" />

    <!-- ケージの太線 (ピンク/マゼンタ) -->
    <!-- (0,0)-(1,0) -->
    <path d="M 0,0 L 35,0 L 35,70 L 0,70 Z" fill="none" stroke="#ec4899" stroke-width="2.5" filter="url(#glow)" />
    <!-- (0,1)-(0,2) -->
    <path d="M 35,0 L 105,0 L 105,35 L 35,35 Z" fill="none" stroke="#ec4899" stroke-width="2.5" filter="url(#glow)" />
    
    <!-- 数学ヒント -->
    <text x="3" y="10" font-family="'Outfit', system-ui, sans-serif" font-size="7" font-weight="bold" fill="#ec4899">3+</text>
    <text x="38" y="10" font-family="'Outfit', system-ui, sans-serif" font-size="7" font-weight="bold" fill="#ec4899">8x</text>

    <!-- 入力された数字 (白グロー) -->
    <text x="17.5" y="24" font-family="'Outfit', system-ui, sans-serif" font-size="18" font-weight="extrabold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">1</text>
    <text x="52.5" y="24" font-family="'Outfit', system-ui, sans-serif" font-size="18" font-weight="extrabold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">4</text>
    <text x="87.5" y="24" font-family="'Outfit', system-ui, sans-serif" font-size="18" font-weight="extrabold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">2</text>
  </g>

  <!-- タイトル -->
</svg>
