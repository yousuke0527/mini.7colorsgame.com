<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  

  <!-- 背景 -->
  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- 迷路のグリッド・壁（ネオンブルー） -->
  <g filter="url(#glowBlue)" opacity="0.6">
    <path d="M 50,50 L 750,50 L 750,400 L 50,400 Z" fill="none" stroke="#3b82f6" stroke-width="4" />
    <!-- 縦横の壁パーツ -->
    <path d="M 150,50 L 150,200 M 150,280 L 150,400" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" />
    <path d="M 280,120 L 450,120 M 550,50 L 550,220" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" />
    <path d="M 280,200 L 280,320 M 380,200 L 550,200" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" />
    <path d="M 50,280 L 220,280 M 380,280 L 380,400" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" />
    <path d="M 480,280 L 650,280 M 650,120 L 750,120" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" />
  </g>

  <!-- 鍵アイテム（ネオンイエロー） -->
  <g filter="url(#glowYellow)" transform="translate(600, 180) scale(1.3)">
    <!-- 鍵の頭 -->
    <circle cx="20" cy="20" r="8" fill="none" stroke="#eab308" stroke-width="3" />
    <!-- 鍵の軸と突起 -->
    <path d="M 20,28 L 20,48 L 28,48 M 20,42 L 25,42" fill="none" stroke="#eab308" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- プレイヤー（ネオングリーン） -->
  <g filter="url(#glowGreen)">
    <circle cx="100" cy="120" r="15" fill="#22c55e" fill-opacity="0.3" stroke="#22c55e" stroke-width="4" />
    <circle cx="100" cy="120" r="5" fill="#22c55e" />
  </g>

  <!-- ゴール（ネオンピンクのポータル） -->
  <g filter="url(#glowGreen)" transform="translate(680, 320)">
    <ellipse cx="20" cy="20" rx="25" ry="10" fill="none" stroke="#ec4899" stroke-width="4" transform="rotate(-30 20 20)" />
    <ellipse cx="20" cy="20" rx="15" ry="6" fill="none" stroke="#ec4899" stroke-width="2.5" transform="rotate(-30 20 20)" />
    <circle cx="20" cy="20" r="3" fill="#ec4899" />
  </g>

  <!-- タイトルテキスト -->
</svg>
