<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  
  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- 等式: 6 + 4 = 4 -->
  <g transform="translate(180, 110)" filter="url(#glowBlue)">
    <!-- 6 (7セグ) -->
    <!-- 上 -->
    <line x1="10" y1="10" x2="60" y2="10" stroke="#00f0ff" filter="url(#glow)" stroke-width="5" />
    <!-- 左上 -->
    <line x1="10" y1="10" x2="10" y2="55" stroke="#00f0ff" filter="url(#glow)" stroke-width="5" />
    <!-- 中 -->
    <line x1="10" y1="55" x2="60" y2="55" stroke="#00f0ff" filter="url(#glow)" stroke-width="5" />
    <!-- 左下 -->
    <line x1="10" y1="55" x2="10" y2="100" stroke="#00f0ff" filter="url(#glow)" stroke-width="5" />
    <!-- 下 -->
    <line x1="10" y1="100" x2="60" y2="100" stroke="#00f0ff" filter="url(#glow)" stroke-width="5" />
    <!-- 右下 -->
    <line x1="60" y1="55" x2="60" y2="100" stroke="#00f0ff" filter="url(#glow)" stroke-width="5" />
    <!-- 右上 (OFF) -->
    <line x1="60" y1="10" x2="60" y2="55" stroke="#1e293b" stroke-width="4" />
  </g>

  <!-- 演算子: + -->
  <g transform="translate(290, 110)" filter="url(#glowBlue)">
    <line x1="10" y1="55" x2="50" y2="55" stroke="#00f0ff" filter="url(#glow)" stroke-width="5" />
    <line x1="30" y1="35" x2="30" y2="75" stroke="#00f0ff" filter="url(#glow)" stroke-width="5" />
  </g>

  <!-- 4 -->
  <g transform="translate(370, 110)" filter="url(#glowBlue)">
    <line x1="10" y1="10" x2="10" y2="55" stroke="#00f0ff" filter="url(#glow)" stroke-width="5" />
    <line x1="10" y1="55" x2="60" y2="55" stroke="#00f0ff" filter="url(#glow)" stroke-width="5" />
    <line x1="60" y1="10" x2="60" y2="55" stroke="#00f0ff" filter="url(#glow)" stroke-width="5" />
    <line x1="60" y1="55" x2="60" y2="100" stroke="#00f0ff" filter="url(#glow)" stroke-width="5" />
  </g>

  <!-- イコール: = -->
  <g transform="translate(480, 110)" filter="url(#glowBlue)">
    <line x1="10" y1="45" x2="50" y2="45" stroke="#fbbf24" stroke-width="5" />
    <line x1="10" y1="65" x2="50" y2="65" stroke="#fbbf24" stroke-width="5" />
  </g>

  <!-- 4 (浮いているイエローのマッチ棒を表現) -->
  <g transform="translate(560, 110)" filter="url(#glowBlue)">
    <line x1="10" y1="10" x2="10" y2="55" stroke="#00f0ff" filter="url(#glow)" stroke-width="5" />
    <line x1="10" y1="55" x2="60" y2="55" stroke="#00f0ff" filter="url(#glow)" stroke-width="5" />
    <line x1="60" y1="10" x2="60" y2="55" stroke="#00f0ff" filter="url(#glow)" stroke-width="5" />
    <line x1="60" y1="55" x2="60" y2="100" stroke="#00f0ff" filter="url(#glow)" stroke-width="5" />

    <!-- 浮いたイエローマッチ棒 (手に持っている想定) -->
    <g transform="translate(40, -40) rotate(15)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#fbbf24" stroke-width="6" />
      <circle cx="0" cy="0" r="4.5" fill="#ff007f" />
    </g>
  </g>

  <!-- テキスト -->
</svg>
