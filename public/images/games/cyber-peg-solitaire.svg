<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  
  <rect width="800" height="450" fill="url(#bgGrad)" />
  <!-- Stand Board -->
  <rect x="250" y="50" width="300" height="250" rx="16" fill="rgba(30, 41, 59, 0.4)" stroke="#334155" stroke-width="2" />
  <!-- Holes layout & Pegs -->
  <!-- Row 0 -->
  <circle cx="370" cy="90" r="14" fill="#3b82f6" filter="url(#neonBlue)" /><circle cx="400" cy="90" r="14" fill="#3b82f6" filter="url(#neonBlue)" /><circle cx="430" cy="90" r="14" fill="#3b82f6" filter="url(#neonBlue)" />
  <!-- Row 1 -->
  <circle cx="370" cy="125" r="14" fill="#3b82f6" filter="url(#neonBlue)" /><circle cx="400" cy="125" r="14" fill="#3b82f6" filter="url(#neonBlue)" /><circle cx="430" cy="125" r="14" fill="#3b82f6" filter="url(#neonBlue)" />
  <!-- Row 2 -->
  <circle cx="310" cy="160" r="14" fill="#3b82f6" filter="url(#neonBlue)" /><circle cx="340" cy="160" r="14" fill="#3b82f6" filter="url(#neonBlue)" /><circle cx="370" cy="160" r="14" fill="#3b82f6" filter="url(#neonBlue)" /><circle cx="400" cy="160" r="14" fill="#3b82f6" filter="url(#neonBlue)" /><circle cx="430" cy="160" r="14" fill="#3b82f6" filter="url(#neonBlue)" /><circle cx="460" cy="160" r="14" fill="#3b82f6" filter="url(#neonBlue)" /><circle cx="490" cy="160" r="14" fill="#3b82f6" filter="url(#neonBlue)" />
  <!-- Center (Empty target) -->
  <circle cx="400" cy="160" r="15" fill="#090d16" stroke="#39ff14" stroke-width="2.5" stroke-dasharray="4,3" filter="url(#neonGreen)" />
  <!-- Selected Peg Jump arrow demonstration -->
  <path d="M 400,230 C 400,210 400,180 400,165" fill="none" stroke="#39ff14" filter="url(#glow)" stroke-width="3.5" stroke-dasharray="2,2" />
  <polygon points="400,162 395,170 405,170" fill="#39ff14" />
  <circle cx="400" cy="230" r="14" fill="#ffffff" stroke="#3b82f6" stroke-width="2.5" filter="url(#neonBlue)" />
</svg>
