<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  

  <!-- Background -->
  <rect width="400" height="250" fill="url(#bg-grad)" />

  <!-- Cybernetic Grid -->
  <g opacity="0.05">
    <path d="M 15 45 L 385 45 M 15 80 L 385 80 M 15 115 L 385 115 M 15 150 L 385 150 M 15 185 L 385 185" stroke="#ffffff" stroke-width="1" />
    <path d="M 50 15 L 50 235 M 100 15 L 100 235 M 150 15 L 150 235 M 200 15 L 200 235 M 250 15 L 250 235 M 300 15 L 300 235 M 350 15 L 350 235" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Outer Card Border with Cyan Glow -->
  <rect x="15" y="15" width="370" height="220" rx="16" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.3" filter="url(#glow)" />

  <!-- Glowing Scoreboard (Top Center) -->
  <g filter="url(#glow)">
    <text x="175" y="52" font-family="'Outfit', sans-serif" font-size="20" font-weight="extrabold" fill="#00f0ff" text-anchor="end">09</text>
    <text x="200" y="52" font-family="'Outfit', sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.4">:</text>
    <text x="225" y="52" font-family="'Outfit', sans-serif" font-size="20" font-weight="extrabold" fill="#ff007f" text-anchor="start">12</text>
  </g>

  <!-- Center Dotted Net (Soft Glow) -->
  <line x1="200" y1="20" x2="200" y2="180" stroke="#ffffff" stroke-width="2" stroke-dasharray="6,8" opacity="0.25" filter="url(#glow)" />

  <!-- Left Paddle (Cyan) -->
  <g transform="translate(35, 65)" filter="url(#glow)">
    <!-- Sleek segmented paddle -->
    <rect x="0" y="0" width="8" height="46" rx="4" fill="#090d16" stroke="#00f0ff" filter="url(#glow)" stroke-width="2.5" />
    <line x1="4" y1="8" x2="4" y2="38" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
  </g>

  <!-- Right Paddle (Rose) -->
  <g transform="translate(357, 100)" filter="url(#glow)">
    <rect x="0" y="0" width="8" height="46" rx="4" fill="#090d16" stroke="#ff007f" filter="url(#glow)" stroke-width="2.5" />
    <line x1="4" y1="8" x2="4" y2="38" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
  </g>

  <!-- Multi-Ball 1: Pink Ball hitting Right Paddle with Impact Sparks -->
  <g>
    <!-- Motion/Speed Trail -->
    <path d="M 180 60 Q 270 90 350 120" fill="none" stroke="#ff007f" stroke-width="3.5" stroke-dasharray="3,6" opacity="0.7" filter="url(#glow)" />
    
    <!-- Colliding ball at (352, 120) -->
    <g transform="translate(352, 120)" filter="url(#glow)">
      <circle cx="0" cy="0" r="7.5" fill="#ffffff" stroke="#ff007f" filter="url(#glow)" stroke-width="2" />
      
      <!-- Rebound Impact Sparks -->
      <line x1="0" y1="0" x2="-15" y2="-12" stroke="#ffffff" stroke-width="1.5" />
      <line x1="0" y1="0" x2="-18" y2="4" stroke="#ff007f" filter="url(#glow)" stroke-width="2" />
      <line x1="0" y1="0" x2="-12" y2="15" stroke="#ffffff" stroke-width="1" />
      <circle cx="-16" cy="-14" r="1" fill="#ffffff" />
      <circle cx="-20" cy="5" r="1.5" fill="#ff007f" />
    </g>
  </g>

  <!-- Multi-Ball 2: Cyan Ball rebounding off Left Paddle -->
  <g>
    <!-- Just bounced off Left Paddle at (43, 80) and moving towards top-right -->
    <!-- Rebound path trail -->
    <path d="M 43 80 Q 120 70 210 60" fill="none" stroke="#00f0ff" stroke-width="2.5" stroke-dasharray="2,4" opacity="0.8" filter="url(#glow)" />
    
    <!-- Ball at (95, 74) -->
    <g transform="translate(95, 74)" filter="url(#glow)">
      <circle cx="0" cy="0" r="7" fill="#ffffff" stroke="#00f0ff" filter="url(#glow)" stroke-width="2" />
      
      <!-- Tiny motion trail lines -->
      <line x1="-12" y1="2" x2="-6" y2="1" stroke="#00f0ff" filter="url(#glow)" stroke-width="2" stroke-linecap="round" />
      <line x1="-15" y1="-3" x2="-9" y2="-2" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
    </g>
    
    <!-- Bounce Spark at Left Paddle surface -->
    <g transform="translate(44, 80)" filter="url(#glow)">
      <circle cx="0" cy="0" r="4" fill="#ffffff" opacity="0.8" />
      <path d="M 0 0 L 10 -8 M 0 0 L 12 8" stroke="#00f0ff" filter="url(#glow)" stroke-width="1.5" stroke-linecap="round" />
    </g>
  </g>

  <!-- Title -->
  
  <!-- Category Badge -->
  <rect x="150" y="210" width="100" height="18" rx="9" fill="#00f0ff" opacity="0.2"/>
</svg>