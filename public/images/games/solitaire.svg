<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  
  <!-- 背景 -->
  <rect width="400" height="250" fill="#090d16"/>
  <rect x="20" y="20" width="360" height="210" rx="12" fill="none" stroke="#ff007f" filter="url(#glow)" stroke-width="1.5" opacity="0.25" />

  <!-- ソリティアのシミュレーションイラスト -->
  <g transform="translate(50, 25)">
    <!-- 組札（Foundation）枠 - 右上に配置 -->
    <g transform="translate(180, 5)">
      <rect width="32" height="46" rx="3" fill="#0f172a" stroke="#ffffff" stroke-dasharray="3, 2" stroke-width="1.5" opacity="0.4" />
      <!-- スペードマーク小さく -->
      <path d="M 16, 20 C 16, 20, 12, 25, 12, 28 C 12, 30, 14, 30, 16, 29 C 18, 30, 20, 30, 20, 28 C 20, 25, 16, 20, 16, 20 Z" fill="#ffffff" opacity="0.3" />
      <path d="M 16, 27 L 14, 33 L 18, 33 Z" fill="#ffffff" opacity="0.3" />
    </g>
    <g transform="translate(225, 5)">
      <rect width="32" height="46" rx="3" fill="#0f172a" stroke="#ef4444" stroke-dasharray="3, 2" stroke-width="1.5" opacity="0.4" />
      <!-- ハートマーク小さく -->
      <path d="M 16, 28 C 16, 28, 11, 23, 11, 20 C 11, 17, 14, 17, 16, 19 C 18, 17, 21, 17, 21, 20 C 21, 23, 16, 28, 16, 28 Z" fill="#ef4444" opacity="0.3" />
    </g>

    <!-- 山札（Stock/Talon） - 左上に配置 -->
    <g transform="translate(10, 5)">
      <rect width="32" height="46" rx="3" fill="#1e293b" stroke="#3b82f6" stroke-width="2" filter="url(#glow)" />
      <!-- 背面パターン（ネオンクロス） -->
      <path d="M 0,0 L 32,46 M 32,0 L 0,46" stroke="#3b82f6" stroke-width="1" opacity="0.5" />
    </g>
    <!-- めくられたカード -->
    <g transform="translate(50, 5)">
      <rect width="32" height="46" rx="3" fill="#1e293b" stroke="#ffffff" stroke-width="1.8" filter="url(#glow)" />
      <text x="7" y="14" font-family="'Outfit', sans-serif" font-size="10" font-weight="bold" fill="#ffffff">A</text>
      <!-- クラブマーク -->
      <circle cx="16" cy="23" r="3.5" fill="#ffffff" />
      <circle cx="12.5" cy="27" r="3.5" fill="#ffffff" />
      <circle cx="19.5" cy="27" r="3.5" fill="#ffffff" />
      <path d="M 16, 27 L 14, 34 L 18, 34 Z" fill="#ffffff" />
    </g>

    <!-- 場札のカスケード（列1） -->
    <g transform="translate(10, 65)">
      <!-- 重なるカード1 -->
      <rect width="32" height="46" rx="3" fill="#1e293b" stroke="#3b82f6" stroke-width="1" opacity="0.4" />
      <!-- 重なるカード2 (下にずらして重ねる) -->
      <g transform="translate(0, 12)">
        <rect width="32" height="46" rx="3" fill="#1e293b" stroke="#ef4444" stroke-width="1.8" filter="url(#glow)" />
        <text x="7" y="14" font-family="'Outfit', sans-serif" font-size="10" font-weight="bold" fill="#ef4444">10</text>
        <path d="M 16, 27 C 16, 27, 12.5, 23.5, 12.5, 21 C 12.5, 18.5, 14.5, 18.5, 16, 20.5 C 17.5, 18.5, 19.5, 18.5, 19.5, 21 C 19.5, 23.5, 16, 27, 16, 27 Z" fill="#ef4444" filter="url(#glow)" />
      </g>
      <!-- 重なるカード3 (さらに下にずらして重ねる) -->
      <g transform="translate(0, 24)">
        <rect width="32" height="46" rx="3" fill="#1e293b" stroke="#ffffff" stroke-width="2" filter="url(#glow)" />
        <text x="7" y="14" font-family="'Outfit', sans-serif" font-size="10" font-weight="bold" fill="#ffffff">9</text>
        <!-- スペードマーク -->
        <path d="M 16, 20 C 16, 20, 12, 25, 12, 28 C 12, 30, 14, 30, 16, 29 C 18, 30, 20, 30, 20, 28 C 20, 25, 16, 20, 16, 20 Z" fill="#ffffff" filter="url(#glow)" />
        <path d="M 16, 27 L 14, 33 L 18, 33 Z" fill="#ffffff" />
      </g>
    </g>

    <!-- 場札のカスケード（列2 - ドラッグで移動中） -->
    <g transform="translate(90, 65)">
      <rect width="32" height="46" rx="3" fill="#1e293b" stroke="#3b82f6" stroke-width="1" opacity="0.4" />
      <g transform="translate(0, 12)">
        <rect width="32" height="46" rx="3" fill="#1e293b" stroke="#ffffff" stroke-width="1.8" filter="url(#glow)" />
        <text x="7" y="14" font-family="'Outfit', sans-serif" font-size="10" font-weight="bold" fill="#ffffff">J</text>
      </g>
    </g>
  </g>

  <!-- タイトル -->
  <!-- カテゴリバッジ -->
  <rect x="150" y="210" width="100" height="18" rx="9" fill="#ff007f" opacity="0.2"/>
</svg>