<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  
  <!-- 背景 -->
  <rect width="400" height="250" fill="#090d16"/>
  <rect x="20" y="20" width="360" height="210" rx="12" fill="none" stroke="#eab308" stroke-width="1.5" opacity="0.25" />

  <!-- 1010パズルのシミュレーションイラスト -->
  <g transform="translate(110, 20)">
    <!-- 10x10 ボードグリッド (暗めのブルー) -->
    <rect width="180" height="130" fill="#0f172a" stroke="#1e293b" stroke-width="2" rx="4" />
    
    <!-- グリッド背景線 -->
    <line x1="36" y1="0" x2="36" y2="130" stroke="#1e293b" stroke-width="1" opacity="0.5" />
    <line x1="72" y1="0" x2="72" y2="130" stroke="#1e293b" stroke-width="1" opacity="0.5" />
    <line x1="108" y1="0" x2="108" y2="130" stroke="#1e293b" stroke-width="1" opacity="0.5" />
    <line x1="144" y1="0" x2="144" y2="130" stroke="#1e293b" stroke-width="1" opacity="0.5" />

    <line x1="0" y1="26" x2="180" y2="26" stroke="#1e293b" stroke-width="1" opacity="0.5" />
    <line x1="0" y1="52" x2="180" y2="52" stroke="#1e293b" stroke-width="1" opacity="0.5" />
    <line x1="0" y1="78" x2="180" y2="78" stroke="#1e293b" stroke-width="1" opacity="0.5" />
    <line x1="0" y1="104" x2="180" y2="104" stroke="#1e293b" stroke-width="1" opacity="0.5" />

    <!-- ボード上のネオンブロックたち -->
    <!-- 3x3正方形ブロック (シアン - 右上) -->
    <rect x="109" y="1" width="70" height="50" rx="3" fill="#1e293b" stroke="#0ea5e9" stroke-width="2" filter="url(#glow)"/>
    <line x1="144" y1="1" x2="144" y2="51" stroke="#0ea5e9" stroke-width="1.5" opacity="0.7"/>
    <line x1="109" y1="26" x2="179" y2="26" stroke="#0ea5e9" stroke-width="1.5" opacity="0.7"/>

    <!-- L字型ブロック (マゼンタ - 左下) -->
    <path d="M 1,103 L 1,129 L 71,129 L 71,103 L 37,103 L 37,103 L 37,77 L 1,77 Z" fill="#1e293b" stroke="#ec4899" stroke-width="2" stroke-linejoin="round" filter="url(#glow)" />

    <!-- 直線 1x3ブロック (イエロー - 中右、設置しようと浮いている) -->
    <g transform="translate(73, 53)" filter="url(#glow)">
      <rect width="34" height="75" rx="3" fill="#2d2206" stroke="#eab308" stroke-width="2.5" />
      <line x1="0" y1="25" x2="34" y2="25" stroke="#eab308" stroke-width="1.5" />
      <line x1="0" y1="50" x2="34" y2="50" stroke="#eab308" stroke-width="1.5" />
      <!-- 移動影 -->
      <ellipse cx="17" cy="85" rx="10" ry="2" fill="#000" opacity="0.4"/>
    </g>
  </g>

  <!-- タイトル -->
  <!-- カテゴリバッジ -->
  <rect x="150" y="210" width="100" height="18" rx="9" fill="#eab308" opacity="0.2"/>
</svg>