<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  

  <!-- Background -->
  <rect width="400" height="250" fill="url(#bg-grad)" />

  <!-- Outer Border -->
  <rect x="20" y="20" width="360" height="210" rx="12" fill="none" stroke="#39ff14" filter="url(#glow)" stroke-width="2" opacity="0.25" />

  <!-- 5-Letter Slots Row -->
  <!-- Coordinates:
      Col 1: x=94,  Col 2: x=138, Col 3: x=182, Col 4: x=226, Col 5: x=270
      y=80, width=36, height=36
  -->

  <!-- Letter 1: 'C' - Correct (Green) -->
  <g transform="translate(94, 75)">
    <rect width="36" height="36" rx="6" fill="#064e3b" stroke="#39ff14" stroke-width="2.5" filter="url(#glow)" />
    <text x="18" y="26" font-family="'Outfit', sans-serif" font-size="22" font-weight="900" fill="#ffffff" text-anchor="middle" filter="url(#glow)">C</text>
  </g>

  <!-- Letter 2: 'O' - Misplaced (Yellow) -->
  <g transform="translate(138, 75)">
    <rect width="36" height="36" rx="6" fill="#78350f" stroke="#fbbf24" stroke-width="2.5" filter="url(#glow)" />
    <text x="18" y="26" font-family="'Outfit', sans-serif" font-size="22" font-weight="900" fill="#ffffff" text-anchor="middle" filter="url(#glow)">O</text>
  </g>

  <!-- Letter 3: 'D' - Absent (Dark/Gray) -->
  <g transform="translate(182, 75)">
    <rect width="36" height="36" rx="6" fill="#1e293b" stroke="#475569" stroke-width="2" />
    <text x="18" y="26" font-family="'Outfit', sans-serif" font-size="22" font-weight="900" fill="#94a3b8" text-anchor="middle">D</text>
  </g>

  <!-- Letter 4: 'E' - Correct (Green) -->
  <g transform="translate(226, 75)">
    <rect width="36" height="36" rx="6" fill="#064e3b" stroke="#39ff14" stroke-width="2.5" filter="url(#glow)" />
    <text x="18" y="26" font-family="'Outfit', sans-serif" font-size="22" font-weight="900" fill="#ffffff" text-anchor="middle" filter="url(#glow)">E</text>
  </g>

  <!-- Letter 5: 'S' - Misplaced (Yellow) -->
  <g transform="translate(270, 75)">
    <rect width="36" height="36" rx="6" fill="#78350f" stroke="#fbbf24" stroke-width="2.5" filter="url(#glow)" />
    <text x="18" y="26" font-family="'Outfit', sans-serif" font-size="22" font-weight="900" fill="#ffffff" text-anchor="middle" filter="url(#glow)">S</text>
  </g>

  <!-- Keyboard Hint Row (Stylized keys at bottom of illustration) -->
  <g transform="translate(140, 130)" opacity="0.7">
    <!-- Key Q -->
    <rect x="0" y="0" width="18" height="18" rx="4" fill="#0f172a" stroke="#39ff14" filter="url(#glow)" stroke-width="1" />
    <text x="9" y="12" font-family="sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">A</text>
    <!-- Key W (Correct key indicator) -->
    <rect x="24" y="0" width="18" height="18" rx="4" fill="#064e3b" stroke="#39ff14" stroke-width="1" filter="url(#glow)"/>
    <text x="33" y="12" font-family="sans-serif" font-size="9" fill="#ffffff" text-anchor="middle" filter="url(#glow)">W</text>
    <!-- Key E -->
    <rect x="48" y="0" width="18" height="18" rx="4" fill="#0f172a" stroke="#39ff14" filter="url(#glow)" stroke-width="1" />
    <text x="57" y="12" font-family="sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">S</text>
    <!-- Key R -->
    <rect x="72" y="0" width="18" height="18" rx="4" fill="#78350f" stroke="#fbbf24" stroke-width="1" filter="url(#glow)" />
    <text x="81" y="12" font-family="sans-serif" font-size="9" fill="#ffffff" text-anchor="middle" filter="url(#glow)">D</text>
    <!-- Key T -->
    <rect x="96" y="0" width="18" height="18" rx="4" fill="#0f172a" stroke="#39ff14" filter="url(#glow)" stroke-width="1" />
    <text x="105" y="12" font-family="sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">F</text>
  </g>

  <!-- Gameplay HUD Info -->
  <text x="200" y="167" font-family="'Plus Jakarta Sans', sans-serif" font-size="10" font-weight="bold" fill="#94a3b8" text-anchor="middle" letter-spacing="3">5-LETTER MATRIX</text>

  <!-- タイトル -->
  
  <!-- カテゴリバッジ -->
  <rect x="150" y="210" width="100" height="18" rx="9" fill="#39ff14" opacity="0.2"/>
</svg>