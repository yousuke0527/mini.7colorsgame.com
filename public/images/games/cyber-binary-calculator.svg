<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  
  <rect width="800" height="450" fill="url(#bgGrad)" />
  
  <g transform="translate(400, 160)">
    <!-- Circuit lines -->
    <!-- Input to Gate 1 -->
    <path d="M -180 -45 L -100 -45 L -100 -20 L -60 -20" fill="none" stroke="#334155" stroke-width="3" />
    <path d="M -180 15 L -100 15 L -100 -5 L -60 -5" fill="none" stroke="#334155" stroke-width="3" />
    <!-- Gate 1 to Gate 2 -->
    <path d="M -10 -12 L 40 -12 L 40 10 L 80 10" fill="none" stroke="#06b6d4" stroke-width="3" filter="url(#glowCyan)" />
    <!-- Input C to Gate 2 -->
    <path d="M -180 65 L 40 65 L 40 25 L 80 25" fill="none" stroke="#334155" stroke-width="3" />
    <!-- Gate 2 to Target -->
    <path d="M 130 18 L 200 18" fill="none" stroke="#06b6d4" stroke-width="3" filter="url(#glowCyan)" />

    <!-- Inputs -->
    <text x="-190" y="-40" font-family="Outfit, sans-serif" font-weight="bold" font-size="14" fill="#06b6d4" text-anchor="end">A: [ 1 ]</text>
    <text x="-190" y="20" font-family="Outfit, sans-serif" font-weight="bold" font-size="14" fill="#64748b" text-anchor="end">B: [ 0 ]</text>
    <text x="-190" y="70" font-family="Outfit, sans-serif" font-weight="bold" font-size="14" fill="#06b6d4" text-anchor="end">C: [ 1 ]</text>

    <!-- Slots/Gates -->
    <!-- Gate 1 -->
    <rect x="-60" y="-30" width="50" height="34" rx="4" fill="#111827" stroke="#39ff14" filter="url(#glow)" stroke-width="2" />
    <text x="-35" y="-9" font-family="Outfit, sans-serif" font-weight="bold" font-size="12" fill="#ffffff" text-anchor="middle">XOR</text>
    
    <!-- Gate 2 -->
    <rect x="80" y="2" width="50" height="34" rx="4" fill="#111827" stroke="#39ff14" filter="url(#glow)" stroke-width="2" />
    <text x="105" y="23" font-family="Outfit, sans-serif" font-weight="bold" font-size="12" fill="#ffffff" text-anchor="middle">AND</text>

    <!-- Target Output -->
    <rect x="200" y="-2" width="56" height="40" rx="4" fill="#1e293b" stroke="#ff007f" filter="url(#glow)" stroke-width="2" />
    <text x="228" y="24" font-family="Outfit, sans-serif" font-weight="bold" font-size="16" fill="#ffffff" text-anchor="middle">1</text>
  </g>
</svg>
