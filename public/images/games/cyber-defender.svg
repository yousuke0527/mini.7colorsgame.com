<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  

  <!-- 背景 -->
  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- 防御都市シールド（下部に3つ、ネオンシアン） -->
  <g filter="url(#glowCyan)">
    <!-- 都市1 -->
    <path d="M 100,420 A 40,40 0 0,1 180,420 Z" fill="#06b6d4" fill-opacity="0.1" stroke="#06b6d4" stroke-width="4" />
    <rect x="130" y="405" width="20" height="15" fill="#06b6d4" opacity="0.6" />
    
    <!-- 都市2 -->
    <path d="M 360,420 A 40,40 0 0,1 440,420 Z" fill="#06b6d4" fill-opacity="0.1" stroke="#06b6d4" stroke-width="4" />
    <rect x="390" y="405" width="20" height="15" fill="#06b6d4" opacity="0.6" />

    <!-- 都市3 -->
    <path d="M 620,420 A 40,40 0 0,1 700,420 Z" fill="#06b6d4" fill-opacity="0.1" stroke="#06b6d4" stroke-width="4" />
    <rect x="650" y="405" width="20" height="15" fill="#06b6d4" opacity="0.6" />

    <!-- 防衛拠点ライン -->
    <line x1="0" y1="420" x2="800" y2="420" stroke="#06b6d4" stroke-width="3" opacity="0.5" />
  </g>

  <!-- パルス爆風（中央付近、ネオンシアンの同心円） -->
  <g filter="url(#glowCyan)" opacity="0.8">
    <circle cx="350" cy="180" r="60" fill="none" stroke="#06b6d4" stroke-width="3" stroke-dasharray="8,6" />
    <circle cx="350" cy="180" r="40" fill="none" stroke="#06b6d4" stroke-width="2" />
    <circle cx="350" cy="180" r="10" fill="#06b6d4" fill-opacity="0.4" />
  </g>

  <!-- 落下するサイバーメテオ（ネオンレッド） -->
  <g filter="url(#glowRed)">
    <!-- メテオ1（爆風に突入して崩壊寸前） -->
    <line x1="300" y1="50" x2="335" y2="140" stroke="#ef4444" stroke-width="2" opacity="0.4" />
    <path d="M 335,140 L 332,150 L 342,145 Z" fill="#ef4444" opacity="0.7" />
    <circle cx="335" cy="140" r="8" fill="#ef4444" />

    <!-- メテオ2（左側） -->
    <line x1="80" y1="20" x2="130" y2="180" stroke="#ef4444" stroke-width="3" opacity="0.5" />
    <circle cx="130" cy="180" r="12" fill="#ef4444" />

    <!-- メテオ3（右側） -->
    <line x1="680" y1="40" x2="650" y2="190" stroke="#ef4444" stroke-width="2.5" opacity="0.5" />
    <circle cx="650" cy="190" r="10" fill="#ef4444" />
  </g>

  <!-- タイトルテキスト -->
</svg>
