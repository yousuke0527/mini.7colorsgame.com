<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  
  <!-- 背景 -->
  <rect width="400" height="300" fill="#090d16" />
  <rect width="380" height="280" x="10" y="10" rx="15" fill="#0f172a" stroke="#22c55e" stroke-width="1.5" opacity="0.3" />

  <!-- ビリヤードテーブルのシミュレーションイラスト -->
  <g transform="translate(50, 20)">
    <!-- ビリヤード台のクッション枠 -->
    <rect width="300" height="150" fill="#064e3b" stroke="#22c55e" stroke-width="3" rx="10" filter="url(#glow)" opacity="0.9" />
    <rect width="280" height="130" x="10" y="10" fill="#022c22" rx="4" />

    <!-- ポケット (穴) -->
    <circle cx="15" cy="15" r="10" fill="#000" />
    <circle cx="150" cy="12" r="9" fill="#000" />
    <circle cx="285" cy="15" r="10" fill="#000" />
    <circle cx="15" cy="135" r="10" fill="#000" />
    <circle cx="150" cy="138" r="9" fill="#000" />
    <circle cx="285" cy="135" r="10" fill="#000" />

    <!-- 的球（ネオンで光るカラフルな球） -->
    <!-- 9番（黄） -->
    <circle cx="210" cy="75" r="10" fill="#eab308" filter="url(#glow)" />
    <circle cx="210" cy="75" r="5" fill="#ffffff" />
    <text x="210" y="78" font-family="system-ui" font-size="8" font-weight="bold" fill="#000000" text-anchor="middle">9</text>

    <!-- 3番（赤） -->
    <circle cx="230" cy="63" r="10" fill="#ef4444" filter="url(#glow)" />
    <circle cx="230" cy="63" r="5" fill="#ffffff" />
    <text x="230" y="66" font-family="system-ui" font-size="8" font-weight="bold" fill="#000000" text-anchor="middle">3</text>

    <!-- 2番（青） -->
    <circle cx="230" cy="87" r="10" fill="#3b82f6" filter="url(#glow)" />
    <circle cx="230" cy="87" r="5" fill="#ffffff" />
    <text x="230" y="90" font-family="system-ui" font-size="8" font-weight="bold" fill="#000000" text-anchor="middle">2</text>

    <!-- 手球（白） -->
    <circle cx="90" cy="95" r="10" fill="#ffffff" filter="url(#glow)" />

    <!-- ショットガイドライン (点線、シアン) -->
    <line x1="90" y1="95" x2="198" y2="78" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4, 4" filter="url(#glow)" />
    <!-- 跳ね返り予測線 -->
    <line x1="198" y1="78" x2="270" y2="40" stroke="#06b6d4" stroke-width="1" stroke-dasharray="3, 3" opacity="0.6" />

    <!-- キュー（棒、木目ネオン調） -->
    <!-- キューが手球に向かっている様子 -->
    <g transform="translate(10, 110) rotate(-9)">
      <line x1="0" y1="0" x2="70" y2="0" stroke="#a16207" stroke-width="3" />
      <line x1="70" y1="0" x2="77" y2="0" stroke="#ffffff" stroke-width="2.5" />
      <line x1="77" y1="0" x2="80" y2="0" stroke="#06b6d4" stroke-width="2.5" filter="url(#glow)" />
    </g>
  </g>

  <!-- タイトル・カテゴリ -->
</svg>