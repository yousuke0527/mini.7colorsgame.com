<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  
  <rect width="400" height="250" fill="url(#bg-grad)" />
  <rect x="20" y="20" width="360" height="210" rx="12" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.25" />
  
  <!-- Target Display -->
  <g transform="translate(130, 35)">
    <rect x="0" y="0" width="140" height="35" rx="6" fill="#0f172a" stroke="#22d3ee" stroke-width="2" filter="url(#glow)"/>
    <text x="70" y="25" font-family="monospace" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">DEC: 42</text>
  </g>
  
  <!-- Bit Switches (8 bits representation) -->
  <g transform="translate(30, 85)">
    <!-- 128 (OFF) -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="36" height="36" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1.5" opacity="0.8"/>
      <text x="18" y="18" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">128</text>
      <text x="18" y="30" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">0</text>
    </g>
    <!-- 64 (OFF) -->
    <g transform="translate(42, 0)">
      <rect x="0" y="0" width="36" height="36" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1.5" opacity="0.8"/>
      <text x="18" y="18" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">64</text>
      <text x="18" y="30" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">0</text>
    </g>
    <!-- 32 (ON) -->
    <g transform="translate(84, 0)">
      <rect x="0" y="0" width="36" height="36" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="2" filter="url(#glow)"/>
      <text x="18" y="18" font-family="monospace" font-size="10" fill="#22d3ee" text-anchor="middle" filter="url(#glow)">32</text>
      <text x="18" y="30" font-family="monospace" font-size="10" fill="#ffffff" text-anchor="middle" filter="url(#glow)">1</text>
    </g>
    <!-- 16 (OFF) -->
    <g transform="translate(126, 0)">
      <rect x="0" y="0" width="36" height="36" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1.5" opacity="0.8"/>
      <text x="18" y="18" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">16</text>
      <text x="18" y="30" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">0</text>
    </g>
    <!-- 8 (ON) -->
    <g transform="translate(168, 0)">
      <rect x="0" y="0" width="36" height="36" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="2" filter="url(#glow)"/>
      <text x="18" y="18" font-family="monospace" font-size="10" fill="#22d3ee" text-anchor="middle" filter="url(#glow)">8</text>
      <text x="18" y="30" font-family="monospace" font-size="10" fill="#ffffff" text-anchor="middle" filter="url(#glow)">1</text>
    </g>
    <!-- 4 (OFF) -->
    <g transform="translate(210, 0)">
      <rect x="0" y="0" width="36" height="36" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1.5" opacity="0.8"/>
      <text x="18" y="18" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">4</text>
      <text x="18" y="30" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">0</text>
    </g>
    <!-- 2 (ON) -->
    <g transform="translate(252, 0)">
      <rect x="0" y="0" width="36" height="36" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="2" filter="url(#glow)"/>
      <text x="18" y="18" font-family="monospace" font-size="10" fill="#22d3ee" text-anchor="middle" filter="url(#glow)">2</text>
      <text x="18" y="30" font-family="monospace" font-size="10" fill="#ffffff" text-anchor="middle" filter="url(#glow)">1</text>
    </g>
    <!-- 1 (OFF) -->
    <g transform="translate(294, 0)">
      <rect x="0" y="0" width="36" height="36" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1.5" opacity="0.8"/>
      <text x="18" y="18" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">1</text>
      <text x="18" y="30" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">0</text>
    </g>
  </g>
  
  <text x="200" y="166" font-family="'Plus Jakarta Sans', sans-serif" font-size="10" font-weight="bold" fill="#94a3b8" text-anchor="middle" letter-spacing="3">BINARY CALCULATOR SYSTEM</text>
  <rect x="150" y="210" width="100" height="18" rx="9" fill="#22d3ee" opacity="0.2"/>
</svg>
