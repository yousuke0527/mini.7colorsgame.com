<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- Cyber Grid -->
  <g stroke="#0f172a" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="360" />
    <line x1="200" y1="0" x2="200" y2="360" />
    <line x1="300" y1="0" x2="300" y2="360" />
    <line x1="400" y1="0" x2="400" y2="360" />
    <line x1="500" y1="0" x2="500" y2="360" />
    <line x1="600" y1="0" x2="600" y2="360" />
    <line x1="700" y1="0" x2="700" y2="360" />

    <line x1="0" y1="80" x2="800" y2="80" />
    <line x1="0" y1="160" x2="800" y2="160" />
    <line x1="0" y1="240" x2="800" y2="240" />
    <line x1="0" y1="320" x2="800" y2="320" />
  </g>

  <!-- Pathway (Firewall Stream) -->
  <path d="M 0,160 L 250,160 L 250,280 L 450,280 L 450,120 L 700,120" 
        fill="none" stroke="#0891b2" stroke-width="8" filter="url(#neonCyan)" opacity="0.8" />

  <!-- Defense Nodes (Towers) -->
  <!-- Laser Node (Cyan Square at 350, 160) -->
  <rect x="330" y="180" width="40" height="40" rx="4"
        fill="#1e293b" stroke="#22d3ee" stroke-width="3" filter="url(#neonCyan)" />
  <circle cx="350" cy="200" r="4" fill="#ffffff" />
  
  <!-- Slow Node (Purple Circle at 550, 200) -->
  <circle cx="550" cy="200" r="20" 
          fill="#1e293b" stroke="#c084fc" stroke-width="3" filter="url(#neonPurple)" />
  <circle cx="550" cy="200" r="6" fill="#ffffff" />
  <!-- Slow Range Indicator -->
  <circle cx="550" cy="200" r="70" fill="none" stroke="rgba(192, 132, 252, 0.1)" stroke-width="1.5" stroke-dasharray="4,4" />

  <!-- Malware Enemies (Red circles) -->
  <!-- Enemy 1 -->
  <circle cx="150" cy="160" r="10" fill="#ff007f" filter="url(#neonRed)" />
  <rect x="140" y="142" width="20" height="3" fill="#1e293b" />
  <rect x="140" y="142" width="14" height="3" fill="#39ff14" />
  
  <!-- Enemy 2 (under attack by laser) -->
  <circle cx="350" cy="280" r="10" fill="#ff007f" filter="url(#neonRed)" />
  <rect x="340" y="262" width="20" height="3" fill="#1e293b" />
  <rect x="340" y="262" width="7" height="3" fill="#39ff14" />

  <!-- Enemy 3 (slowed near slow node) -->
  <circle cx="500" cy="120" r="8" fill="#a855f7" filter="url(#neonPurple)" />
  <rect x="492" y="104" width="16" height="3" fill="#1e293b" />
  <rect x="492" y="104" width="12" height="3" fill="#c084fc" />

  <!-- Laser Beam -->
  <line x1="350" y1="200" x2="350" y2="280" stroke="#22d3ee" stroke-width="3.5" filter="url(#neonCyan)" />

  <!-- Title Texts -->
</svg>
