<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  
  <!-- 背景 -->
  <rect width="400" height="250" fill="#090d16"/>
  <rect x="20" y="20" width="360" height="210" rx="12" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.25" />

  <!-- ノノグラムのシミュレーションイラスト (ハートマークを作るイラストロジック) -->
  <g transform="translate(110, 20)">
    <!-- 5x5グリッド (暗いスレート) -->
    <rect x="40" y="40" width="100" height="100" fill="#0f172a" stroke="#334155" stroke-width="2" rx="4" />
    
    <!-- グリッド背景線 -->
    <line x1="60" y1="40" x2="60" y2="140" stroke="#334155" stroke-width="1" />
    <line x1="80" y1="40" x2="80" y2="140" stroke="#334155" stroke-width="1" />
    <line x1="100" y1="40" x2="100" y2="140" stroke="#334155" stroke-width="1" />
    <line x1="120" y1="40" x2="120" y2="140" stroke="#334155" stroke-width="1" />

    <line x1="40" y1="60" x2="140" y2="60" stroke="#334155" stroke-width="1" />
    <line x1="40" y1="80" x2="140" y2="80" stroke="#334155" stroke-width="1" />
    <line x1="40" y1="100" x2="140" y2="100" stroke="#334155" stroke-width="1" />
    <line x1="40" y1="120" x2="140" y2="120" stroke="#334155" stroke-width="1" />

    <!-- ヒント数字 (ネオンシアン) -->
    <!-- 左ヒント (Y方向) -->
    <g font-family="system-ui" font-size="10" font-weight="bold" fill="#0ea5e9" text-anchor="end" filter="url(#glow)">
      <text x="32" y="54" letter-spacing="2">1 1</text>
      <text x="32" y="74" letter-spacing="2">2 2</text>
      <text x="32" y="94" letter-spacing="2">5</text>
      <text x="32" y="114" letter-spacing="2">3</text>
      <text x="32" y="134" letter-spacing="2">1</text>
    </g>
    <!-- 上ヒント (X方向) -->
    <g font-family="system-ui" font-size="10" font-weight="bold" fill="#0ea5e9" text-anchor="middle" filter="url(#glow)">
      <!-- 列0 -->
      <text x="50" y="20">1</text>
      <text x="50" y="32">2</text>
      <!-- 列1 -->
      <text x="70" y="32">4</text>
      <!-- 列2 -->
      <text x="90" y="20">1</text>
      <text x="90" y="32">3</text>
      <!-- 列3 -->
      <text x="110" y="32">4</text>
      <!-- 列4 -->
      <text x="130" y="20">1</text>
      <text x="130" y="32">2</text>
    </g>

    <!-- 塗りつぶされたピクセル (ハート型、ネオンピンク) -->
    <g fill="#ef4444" stroke="#ffffff" stroke-width="0.5" filter="url(#glow)">
      <!-- 行0: [0,1], [0,3] -->
      <rect x="60.5" y="40.5" width="19" height="19" />
      <rect x="100.5" y="40.5" width="19" height="19" />

      <!-- 行1: [1,0], [1,1], [1,3], [1,4] -->
      <rect x="40.5" y="60.5" width="19" height="19" />
      <rect x="60.5" y="60.5" width="19" height="19" />
      <rect x="100.5" y="60.5" width="19" height="19" />
      <rect x="120.5" y="60.5" width="19" height="19" />

      <!-- 行2: [2,0], [2,1], [2,2], [2,3], [2,4] (全部) -->
      <rect x="40.5" y="80.5" width="19" height="19" />
      <rect x="60.5" y="80.5" width="19" height="19" />
      <rect x="80.5" y="80.5" width="19" height="19" />
      <rect x="100.5" y="80.5" width="19" height="19" />
      <rect x="120.5" y="80.5" width="19" height="19" />

      <!-- 行3: [3,1], [3,2], [3,3] -->
      <rect x="60.5" y="100.5" width="19" height="19" />
      <rect x="80.5" y="100.5" width="19" height="19" />
      <rect x="100.5" y="100.5" width="19" height="19" />

      <!-- 行4: [4,2] -->
      <rect x="80.5" y="120.5" width="19" height="19" />
    </g>

    <!-- バツ印 (空きマス、グレーのX) -->
    <path d="M 45,45 L 55,55 M 55,45 L 45,55" stroke="#475569" stroke-width="1.5" />
    <path d="M 85,45 L 95,55 M 95,45 L 85,55" stroke="#475569" stroke-width="1.5" />
  </g>

  <!-- タイトル -->
  <!-- カテゴリバッジ -->
  <rect x="150" y="210" width="100" height="18" rx="9" fill="#ef4444" opacity="0.2"/>
</svg>