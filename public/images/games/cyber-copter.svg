<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  

  <!-- 背景 -->
  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- 洞窟の天井と床（ギザギザのネオンピンクライン） -->
  <g filter="url(#glowPink)" opacity="0.8">
    <!-- 天井 -->
    <path d="M 0,40 L 100,80 L 200,50 L 300,90 L 400,60 L 500,100 L 600,50 L 700,80 L 800,40 L 800,0 L 0,0 Z" fill="#ec4899" fill-opacity="0.1" stroke="#ec4899" stroke-width="4" stroke-linejoin="round" />
    <!-- 地面 -->
    <path d="M 0,410 L 120,370 L 250,400 L 380,360 L 480,400 L 580,350 L 680,390 L 800,360 L 800,450 L 0,450 Z" fill="#ec4899" fill-opacity="0.1" stroke="#ec4899" stroke-width="4" stroke-linejoin="round" />
  </g>

  <!-- 障害物のネオンウォール -->
  <g filter="url(#glowPink)" opacity="0.9">
    <rect x="520" y="100" width="30" height="130" rx="5" fill="none" stroke="#ec4899" stroke-width="4" />
    <rect x="520" y="270" width="30" height="90" rx="5" fill="none" stroke="#ec4899" stroke-width="4" />
  </g>

  <!-- プレイヤー（ネオンシアンのヘリコプター/ドローン） -->
  <g filter="url(#glowCyan)">
    <!-- プロペラ -->
    <ellipse cx="250" cy="180" rx="45" ry="5" fill="none" stroke="#06b6d4" stroke-width="3" />
    <line x1="250" y1="180" x2="250" y2="195" stroke="#06b6d4" stroke-width="4" />
    <!-- 機体 -->
    <rect x="220" y="195" width="60" height="35" rx="15" fill="#06b6d4" fill-opacity="0.2" stroke="#06b6d4" stroke-width="4" />
    <!-- キャビン窓 -->
    <path d="M 255,198 C 270,198 277,205 277,215 L 255,215 Z" fill="#ffffff" fill-opacity="0.3" stroke="#06b6d4" stroke-width="2" />
    <!-- テール -->
    <path d="M 220,212 L 170,205 L 170,195" fill="none" stroke="#06b6d4" stroke-width="4" stroke-linejoin="round" />
    <line x1="170" y1="200" x2="160" y2="200" stroke="#06b6d4" stroke-width="4" />
    <!-- ソリ -->
    <path d="M 225,230 L 225,240 L 275,240 L 280,235" fill="none" stroke="#06b6d4" stroke-width="3" stroke-linejoin="round" />
    <line x1="260" y1="230" x2="260" y2="240" stroke="#06b6d4" stroke-width="3" />
    
    <!-- 移動軌跡（パーティクル） -->
    <circle cx="140" cy="205" r="3" fill="#06b6d4" opacity="0.8" />
    <circle cx="110" cy="210" r="2" fill="#06b6d4" opacity="0.6" />
    <circle cx="85" cy="200" r="1.5" fill="#06b6d4" opacity="0.4" />
  </g>

  <!-- タイトルテキスト -->
</svg>
