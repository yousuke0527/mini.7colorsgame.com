<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070714" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#140c1e" />
    </linearGradient>
    <!-- コーナーネオン漏れ光 -->
    <radialGradient id="cyanLeak" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="magentaLeak" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <!-- ネオングロー効果 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="250" fill="url(#bgGrad)" />
  
  <!-- コーナー発光オーラ -->
  <rect width="400" height="250" fill="url(#cyanLeak)" pointer-events-none="true" />
  <rect width="400" height="250" fill="url(#magentaLeak)" pointer-events-none="true" />

  <!-- 3Dパースペクティブグリッド（遠近感のある電脳空間） -->
  <g stroke="#1e293b" stroke-width="0.75" opacity="0.35">
    <!-- 地平線 -->
    <line x1="0" y1="120" x2="400" y2="120" stroke="#334155" stroke-width="1" />
    <!-- 消失点(200, 120)に向かうパースライン -->
    <line x1="-100" y1="250" x2="200" y2="120" />
    <line x1="-20" y1="250" x2="200" y2="120" />
    <line x1="60" y1="250" x2="200" y2="120" />
    <line x1="130" y1="250" x2="200" y2="120" />
    <line x1="200" y1="250" x2="200" y2="120" />
    <line x1="270" y1="250" x2="200" y2="120" />
    <line x1="340" y1="250" x2="200" y2="120" />
    <line x1="420" y1="250" x2="200" y2="120" />
    <line x1="500" y1="250" x2="200" y2="120" />
    
    <!-- 横方向のグリッド間隔 (手前ほど広く) -->
    <line x1="0" y1="130" x2="400" y2="130" />
    <line x1="0" y1="145" x2="400" y2="145" />
    <line x1="0" y1="165" x2="400" y2="165" />
    <line x1="0" y1="190" x2="400" y2="190" />
    <line x1="0" y1="220" x2="400" y2="220" />
  </g>
  
  <!-- 外枠ボーダー -->
  <rect width="400" height="250" fill="none" stroke="#334155" stroke-width="2" />
  
  <!-- 背景 -->
  <rect width="400" height="250" fill="#090d16"/>
  <rect x="20" y="20" width="360" height="210" rx="12" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.25" />

  <!-- 混色パズルのシミュレーションイラスト (光の三原色の美しいベン図) -->
  <g transform="translate(100, 20)">
    <!-- 画面バウンディング枠 -->
    <rect width="200" height="130" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1" rx="4" />

    <!-- 3枚のブレンドサークル -->
    <!-- 赤サークル (上) -->
    <circle cx="100" cy="50" r="32" fill="#ef4444" fill-opacity="0.3" stroke="#ef4444" stroke-width="2.5" filter="url(#glow)" />
    
    <!-- 緑サークル (左下) -->
    <circle cx="80" cy="85" r="32" fill="#22c55e" fill-opacity="0.3" stroke="#22c55e" stroke-width="2.5" filter="url(#glow)" />

    <!-- 青サークル (右下) -->
    <circle cx="120" cy="85" r="32" fill="#3b82f6" fill-opacity="0.3" stroke="#3b82f6" stroke-width="2.5" filter="url(#glow)" />

    <!-- 重なり合いのハイライト表現（手描きブレンド） -->
    <!-- 赤＋緑＝黄 (左上重なり) -->
    <path d="M 68,68 A 32,32 0 0,1 100,50 A 32,32 0 0,1 112,74 A 32,32 0 0,1 80,85 Z" fill="#eab308" fill-opacity="0.5" filter="url(#glow)" />
    
    <!-- 赤＋青＝マゼンタ (右上重なり) -->
    <path d="M 88,74 A 32,32 0 0,1 100,50 A 32,32 0 0,1 132,68 A 32,32 0 0,1 120,85 Z" fill="#ec4899" fill-opacity="0.5" filter="url(#glow)" />

    <!-- 緑＋青＝シアン (中央下重なり) -->
    <path d="M 80,85 A 32,32 0 0,1 100,60 A 32,32 0 0,1 120,85 A 32,32 0 0,1 100,105 Z" fill="#0ea5e9" fill-opacity="0.5" filter="url(#glow)" />

    <!-- 3つ全て＝白 (中心) -->
    <path d="M 100,60 A 32,32 0 0,1 112,74 A 32,32 0 0,1 100,85 A 32,32 0 0,1 88,74 Z" fill="#ffffff" fill-opacity="0.8" filter="url(#glow)" />
  </g>

  <!-- タイトル -->
  <!-- カテゴリバッジ -->
  <rect x="150" y="210" width="100" height="18" rx="9" fill="#a855f7" opacity="0.2"/>
</svg>